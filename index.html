/* ════════════════════════════════════════════

const CACHE = {
  OTHER_VISITS:    { key: 'cache_other_visits_v2',     ttlMs: 24 * 60 * 60 * 1000 },
  MY_PROJECTS:     { key: 'cache_my_projects_v2',      ttlMs: 30 * 24 * 60 * 60 * 1000 },
  ADMIN_AGGREGATE: { key: 'cache_admin_aggregate_v1',  ttlMs: 12 * 60 * 60 * 1000 }
};

function getCache(cacheConfig) {
  try {
    const raw = localStorage.getItem(cacheConfig.key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.t || !obj.d) return null;
    if (Date.now() - obj.t > cacheConfig.ttlMs) {
      localStorage.removeItem(cacheConfig.key);
      return null;
    }
    return obj.d;
  } catch(e) {
    console.warn('캐시 읽기 실패:', cacheConfig.key, e);
    return null;
  }
}

function setCache(cacheConfig, data) {
  try {
    const obj = { t: Date.now(), d: data };
    localStorage.setItem(cacheConfig.key, JSON.stringify(obj));
  } catch(e) {
    console.warn('캐시 저장 실패:', cacheConfig.key, e);
    try {
      const keys = ['cache_other_visits_v2', 'cache_my_projects_v2', 'cache_admin_aggregate_v1',
                    'cache_other_visits', 'cache_my_projects'];
      for (const k of keys) {
        if (k !== cacheConfig.key && localStorage.getItem(k)) {
          localStorage.removeItem(k);
          break;
        }
      }
      localStorage.setItem(cacheConfig.key, JSON.stringify({ t: Date.now(), d: data }));
    } catch(retryErr) {
      console.warn('캐시 저장 재시도 실패. 캐싱 없이 진행.');
    }
  }
}

function clearAllCaches() {
  const keys = ['cache_other_visits_v2', 'cache_my_projects_v2', 'cache_admin_aggregate_v1',
                'cache_other_visits', 'cache_my_projects'];
  keys.forEach(k => localStorage.removeItem(k));
  console.log('[캐시] 전체 캐시 삭제 완료');
}

(function migrateOldCaches() {
  const oldKeys = ['cache_other_visits', 'cache_my_projects'];
  let removed = 0;
  oldKeys.forEach(k => {
    if (localStorage.getItem(k)) {
      localStorage.removeItem(k);
      removed++;
    }
  });
  if (removed > 0) console.log('[마이그레이션] 옛 캐시 ' + removed + '개 자동 삭제');
})();

const NOTICE_SEEN_PREFIX = 'notice_seen_';

async function checkNotices() {
  try {
    const snap = await db.ref('notices').once('value');
    const notices = snap.val() || {};

    const queue = [];
    for (const type in notices) {
      const notice = notices[type];
      if (!notice || !notice.version) continue;

      const seenKey = NOTICE_SEEN_PREFIX + type;
      const seenVersion = localStorage.getItem(seenKey);

      if (seenVersion !== notice.version) {
        queue.push({ type: type, notice: notice });
      }
    }

    if (queue.length > 0) {
      console.log('[공지] 미확인 공지 ' + queue.length + '개 발견');
      showNoticesSequentially(queue);
    } else {
      console.log('[공지] 새 공지 없음');
    }
  } catch(e) {
    console.warn('공지 확인 실패:', e);
  }
}

function showNoticesSequentially(queue) {
  if (queue.length === 0) return;
  const item = queue.shift();
  showNoticeModal(item.type, item.notice, function() {
    showNoticesSequentially(queue);
  });
}

function showNoticeModal(type, notice, onClose) {
  const meta = NOTICE_TYPES[type] || { icon: '📢', title: '안내', cacheKeysToClear: [] };
  const modal = document.getElementById('noticeModal');

  document.getElementById('noticeIcon').textContent = meta.icon;
  document.getElementById('noticeTitle').textContent = meta.title;
  document.getElementById('noticeMessage').textContent = notice.message;

  modal.classList.add('show');

  const btnApply = document.getElementById('noticeBtnApply');
  const btnLater = document.getElementById('noticeBtnLater');

  btnApply.onclick = function() {
    if (meta.cacheKeysToClear && meta.cacheKeysToClear.length > 0) {
      meta.cacheKeysToClear.forEach(function(k) {
        localStorage.removeItem(k);
        console.log('[공지] 캐시 갱신: ' + k);
      });
    }
    localStorage.setItem(NOTICE_SEEN_PREFIX + type, notice.version);
    modal.classList.remove('show');
    location.reload();
  };

  btnLater.onclick = function() {
    modal.classList.remove('show');
    if (onClose) setTimeout(onClose, 200);
  };
}

/* v48.0: 일반 파트너용 칩 클릭 자동 이동 */
async function moveToFilteredStoresForPartner(filter) {
  const statusBar = document.getElementById('statusBar');
  if (statusBar) statusBar.textContent = '필터 적용 중...';

  // 'all'은 그냥 현재 화면 그대로 렌더링
  if (filter === 'all') {
    renderMarkers();
    return;
  }

  // 'contract'는 stores_light에서 grade 기반으로 위치 모음
  if (filter === 'contract') {
    await moveToContractStores();
    return;
  }

  // visit/lead/success/fail은 myVisitedStoreData 기반으로 위치 모음
  const targetKeys = [];
  for (const storeKey in myVisitedStoreData) {
    const rec = myVisitedStoreData[storeKey];
    const cur = rec.current || {};
    const outcome = String(cur.outcome || "").trim();

    let status = 'visit';
    if (outcome === '성사') status = 'success';
    else if (outcome === '실패') status = 'fail';
    else {
      const leadFields = [cur.currentStoreName, cur.contact, cur.amount,
                          cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
      const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);
      if (allLeadFilled) status = 'lead';
      else if (outcome === '폐업') status = 'closedByMe';
    }

    if (status === filter) targetKeys.push(storeKey);
  }

  if (targetKeys.length === 0) {
    console.log('[필터 이동] 해당 상태 업장 없음:', filter);
    if (statusBar) statusBar.textContent = '해당 상태 업장 없음';
    renderMarkers();
    return;
  }

  await fitMapToStoreKeys(targetKeys, filter);
}

async function moveToContractStores() {
  const statusBar = document.getElementById('statusBar');
  try {
    const snap = await db.ref('stores_light').once('value');
    const all = snap.val() || {};
    const coords = [];
    for (const k in all) {
      const s = all[k];
      if (!s || isNaN(s.lat) || isNaN(s.lng)) continue;
      if (!isContractGrade(s.grade)) continue;
      // 현재 위치 반경 필터 (기계약은 3km 룰 유지)
      if (currentUserLocation) {
        const dist = haversine(currentUserLocation.lat, currentUserLocation.lng, s.lat, s.lng);
        if (dist > CONTRACT_RADIUS_KM) continue;
      }
      coords.push({ lat: s.lat, lng: s.lng });
      if (coords.length >= FILTER_MOVE_MAX_PINS) break;
    }

    if (coords.length === 0) {
      if (statusBar) statusBar.textContent = '근처 기계약 업장 없음';
      renderMarkers();
      return;
    }

    fitToCoords(coords);
  } catch(e) {
    console.error('[기계약 이동] 실패:', e);
    renderMarkers();
  }
}

async function moveToFilteredStores(filter) {
  if (!visitsAggregate || !visitsAggregate.stores) {

    renderMarkers();

  const targetKeys = [];
  for (const storeKey in visitsAggregate.stores) {

  }

  // v48.1: 관리자뷰는 loadStoresInView에 의존하지 않고
  //        타겟 storeKey들을 직접 fetch해서 정확히 그 핀들만 그림
  await fitAndRenderStoreKeysAdmin(targetKeys, filter);
}

/* v48.1: 관리자뷰 전용 - 타겟 storeKey 목록을 직접 가져와 마커 그리기
 * - loadStoresInView()의 bounds 쿼리 누락 가능성 우회
 * - 정확히 N개 핀을 화면에 표시 보장
 */
async function fitAndRenderStoreKeysAdmin(targetKeys, filterLabel) {
  const statusBar = document.getElementById('statusBar');
  if (statusBar) statusBar.textContent = '필터 적용 중... (' + targetKeys.length + '개)';

  const limited = targetKeys.slice(0, FILTER_MOVE_MAX_PINS);

  try {
    // stores_light에서 병렬로 모든 타겟 데이터 fetch
    const fetchPromises = limited.map(function(k) {
      return db.ref('stores_light/' + k).once('value').then(function(snap) {
        const v = snap.val();
        if (v && !isNaN(v.lat) && !isNaN(v.lng)) {
          v._key = k;
          return v;
        }
        return null;
      }).catch(function() { return null; });
    });

    const results = await Promise.all(fetchPromises);
    const validStores = results.filter(function(s) { return s !== null; });

    if (validStores.length === 0) {
      console.warn('[필터 이동] 유효한 좌표 없음');
      if (statusBar) statusBar.textContent = '좌표 없음';
      return;
    }

    // 폐업 + 프로젝트 가시성 + 기계약 거리 필터 적용 (loadStoresInView와 동일 룰)
    let filtered = validStores.filter(function(s) {
      if (!isClosed(s)) return true;
      const status = getVisitStatus(s);
      return status === 'lead';
    });
    filtered = filtered.filter(function(s) { return isVisibleForProject(s, currentUser.key); });
    filtered = removeContractDuplicates(filtered);

    // allStoresInView를 필터된 결과로 강제 설정 → renderMarkers()가 이걸로 그림
    allStoresInView = filtered;

    // 좌표 모아서 fit (idle 이벤트로 인한 loadStoresInView 덮어쓰기 차단)
    const coords = filtered.map(function(s) { return { lat: s.lat, lng: s.lng }; });

    // idle 이벤트 임시 차단 플래그
    suppressNextIdle = true;
    fitToCoords(coords);

    // fitToCoords가 setBounds → idle 이벤트 발생 가능. 즉시 한 번 그리고
    // idle 후에도 allStoresInView가 유지되도록 함
    renderMarkers();

    console.log('[필터 이동 v48.1] ' + filterLabel + ' ' + filtered.length + '개 핀 직접 렌더링 완료');
  } catch(e) {
    console.error('[필터 이동] 좌표 조회 실패:', e);
    renderMarkers();
  }
}

/* v48.0: 공통 유틸 - 업장 키 목록 → 좌표 조회 → bounds fit */
async function fitMapToStoreKeys(targetKeys, filterLabel) {
  const statusBar = document.getElementById('statusBar');
  if (statusBar) statusBar.textContent = '필터 적용 중... (' + targetKeys.length + '개)';

  // 너무 많으면 일부만
  const limited = targetKeys.slice(0, FILTER_MOVE_MAX_PINS);

  try {
    const fetchPromises = limited.map(function(k) {
      return db.ref('stores_light/' + k).once('value').then(function(snap) {
        const v = snap.val();
        if (v && !isNaN(v.lat) && !isNaN(v.lng)) {
          return { lat: v.lat, lng: v.lng };
        }
        return null;
      }).catch(function() { return null; });
    });

    const results = await Promise.all(fetchPromises);
    const validCoords = results.filter(function(c) { return c !== null; });

    if (validCoords.length === 0) {
      console.warn('[필터 이동] 유효한 좌표 없음');
      if (statusBar) statusBar.textContent = '좌표 없음';
      renderMarkers();
      return;
    }

    fitToCoords(validCoords);
    console.log('[필터 이동] ' + filterLabel + ' ' + validCoords.length + '개 핀 보이도록 이동 완료');
  } catch(e) {
    console.error('[필터 이동] 좌표 조회 실패:', e);
    renderMarkers();
  }
}

function fitToCoords(coords) {
  if (!coords || coords.length === 0) return;
  if (coords.length === 1) {
    map.setCenter(new kakao.maps.LatLng(coords[0].lat, coords[0].lng));
    map.setLevel(4);
  } else {
    const bounds = new kakao.maps.LatLngBounds();
    coords.forEach(function(c) {
      bounds.extend(new kakao.maps.LatLng(c.lat, c.lng));
    });
    // v48.1: 패딩 추가 (top, right, bottom, left 픽셀)
    // 핀이 화면 가장자리에 딱 붙지 않게 여유 → idle 후 bounds 재계산 시 누락 방지
    map.setBounds(bounds, 80, 80, 80, 80);
    setTimeout(function() {
      if (map.getLevel() < 4) map.setLevel(4);
    }, 100);
  }
}

async function loadVisitsAggregate() {
  const cached = getCache(CACHE.ADMIN_AGGREGATE);
  if (cached) {
    visitsAggregate = cached;
    console.log('[캐시 적중] 관리자 집계 (' +
                (cached.stores ? Object.keys(cached.stores).length : 0) + '개 업장, version=' + cached.version + ')');
    return;
  }

  try {
    const snap = await db.ref('visits_aggregate').once('value');
    const data = snap.val();
    if (!data) {
      console.warn('[관리자 집계] visits_aggregate 노드 없음.');
      visitsAggregate = { stores: {}, summary: {}, version: '미집계', updatedAt: 0 };
      return;
    }
    visitsAggregate = data;
    setCache(CACHE.ADMIN_AGGREGATE, data);
    const storeCount = data.stores ? Object.keys(data.stores).length : 0;
    console.log('[관리자 집계] Firebase 로드 완료: ' + storeCount + '개 업장, version=' + data.version);
  } catch(e) {
    console.warn('관리자 집계 로드 실패:', e);
    visitsAggregate = { stores: {}, summary: {}, version: '오류', updatedAt: 0 };
  }
}

function updateAdminStatsBar() {

    document.getElementById('adminStatsBar').classList.remove('visible');

  const summary = visitsAggregate.summary || {};
  document.getElementById('adminStat-visit').textContent = summary.visit || 0;
  document.getElementById('adminStat-lead').textContent = summary.lead || 0;

  document.getElementById('adminStat-fail').textContent = summary.fail || 0;

  const v = visitsAggregate.version || '미집계';
  const ts = visitsAggregate.updatedAt;
  let versionText = 'v' + v;
  if (ts) {
    const d = new Date(ts);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    versionText = '집계: ' + mm + '/' + dd + ' ' + hh + ':' + mi;
  }
  document.getElementById('adminStatsVersion').textContent = versionText;

  document.getElementById('adminStatsBar').classList.add('visible');
}

function computeMyVisitCounts() {
  const counts = { visit: 0, lead: 0, success: 0, fail: 0 };

  for (const storeKey in myVisitedStoreData) {
    const rec = myVisitedStoreData[storeKey];
    const cur = rec.current || {};
    const outcome = String(cur.outcome || "").trim();

    if (outcome === "성사") { counts.success++; continue; }
    if (outcome === "실패") { counts.fail++; continue; }

    const leadFields = [cur.currentStoreName, cur.contact, cur.amount,
                        cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
    const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);
    if (allLeadFilled) { counts.lead++; continue; }

    if (outcome === "폐업") continue;

    const anyField = leadFields.some(v => String(v || "").trim().length > 0)
                     || String(cur.price || "").trim().length > 0
                     || String(cur.freq || "").trim().length > 0;
    if (anyField) counts.visit++;
  }

  return counts;
}

function getFilterColor(f) {
  return { all:"#363859", visit:"#4d4678", lead:"#43A047", success:"#F5B800", fail:"#E53935", contract:"#F2AC57" }[f] || "#363859";
}

/* v48.0: 클러스터 인스턴스 생성 헬퍼
 * - 기본 스타일은 placeholder, 실제 색상은 clusterover 이벤트에서 동적 결정
 * - 크기는 멤버 수에 따라 3단계 (< 10 / 10-99 / 100+)
 */
function createClusterer() {
  const baseStyle = {
    color: 'white',
    border: '3px solid white',
    borderRadius: '50%',
    textAlign: 'center',
    fontWeight: '700',
    boxShadow: '0 2px 10px rgba(0,0,0,0.25)'
  };

  const clusterer = new kakao.maps.MarkerClusterer({
    map: map,
    averageCenter: true,
    minLevel: CLUSTER_MIN_LEVEL,
    minClusterSize: 2,
    disableClickZoom: false,
    gridSize: 60,
    calculator: [10, 100],
    styles: [
      Object.assign({}, baseStyle, {
        width: '44px', height: '44px',
        lineHeight: '38px', fontSize: '13px',
        background: '#363859'   // placeholder, 실제 색은 동적 결정
      }),
      Object.assign({}, baseStyle, {
        width: '52px', height: '52px',
        lineHeight: '46px', fontSize: '14px',
        background: '#363859'
      }),
      Object.assign({}, baseStyle, {
        width: '60px', height: '60px',
        lineHeight: '54px', fontSize: '15px',
        background: '#363859'
      })
    ]
  });

  // 클러스터 생성/갱신될 때마다 동적 색상 적용
  kakao.maps.event.addListener(clusterer, 'clustered', function(clusters) {
    applyClusterColors(clusters);
  });

  return clusterer;
}

/* v48.0: 클러스터 색상 결정 + DOM 직접 적용
 * - 단일 카테고리 필터 활성: 해당 카테고리 색상으로 통일
 * - 'all' 또는 'project': 클러스터 멤버들의 status 분포에서 1위 색상
 */
function applyClusterColors(clusters) {
  if (!clusters || clusters.length === 0) return;

  clusters.forEach(function(cluster) {
    let bgColor;

    // 단일 카테고리 필터인 경우 → 그 색상으로 통일
    const filterColorMap = {
      visit: '#4d4678',
      lead: '#43A047',
      success: '#F5B800',
      fail: '#E53935',
      contract: '#F2AC57'
    };

    if (filterColorMap[currentFilter]) {
      bgColor = filterColorMap[currentFilter];
    } else if (currentFilter === 'project') {
      // 프로젝트뷰는 업박스 메인 그라데이션 톤
      bgColor = '#363859';
    } else {
      // 'all' → 클러스터 내 status 분포 분석
      bgColor = computeDominantClusterColor(cluster);
    }

    // DOM에 직접 적용
    try {
      const markers = cluster.getMarkers();
      // CustomOverlay 내부 div에 접근
      const clusterEl = cluster.getClusterMarker && cluster.getClusterMarker();
      // 카카오 SDK 내부 구조: cluster._markers, cluster._clusterMarker
      // _clusterMarker는 CustomOverlay 인스턴스
      const overlay = cluster._clusterMarker;
      if (overlay && overlay.getContent) {
        const content = overlay.getContent();
        // content는 string(HTML) 또는 HTMLElement
        if (typeof content === 'string') {
          // 문자열이면 직접 조작 불가 → DOM 새로 만들어서 setContent
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = content;
          const innerDiv = tempDiv.firstElementChild;
          if (innerDiv && innerDiv.style) {
            innerDiv.style.background = bgColor;
            overlay.setContent(tempDiv.innerHTML);
          }
        } else if (content && content.style) {
          content.style.background = bgColor;
        }
      }
    } catch(e) {
      // DOM 조작 실패해도 기본 색상으로 표시는 됨 (치명적 X)
      console.warn('[클러스터 색상 적용 실패]', e);
    }
  });
}

/* v48.0: 클러스터 내 핀들의 status 분포 → 1위 색상 결정 */
function computeDominantClusterColor(cluster) {
  const markers = cluster.getMarkers ? cluster.getMarkers() : [];
  if (markers.length === 0) return '#363859';

  const counts = { visit: 0, lead: 0, success: 0, fail: 0, contract: 0, closedByMe: 0, none: 0 };

  markers.forEach(function(m) {
    const status = m._upboxStatus || 'none';
    if (counts[status] !== undefined) counts[status]++;
  });

  // 우선순위: success > lead > visit > fail > contract > closedByMe > none
  // (계약 진행 중 핀이 시각적으로 더 먼저 눈에 띄도록)
  const priorityOrder = ['success', 'lead', 'visit', 'fail', 'contract', 'closedByMe'];

  let maxCount = 0;
  let dominant = 'none';
  for (const key of priorityOrder) {
    if (counts[key] > maxCount) {
      maxCount = counts[key];
      dominant = key;
    }
  }

  return getStatusColor(dominant);
}

function startLocationTracking() {
  if (!navigator.geolocation) {
    console.warn('[위치 추적] geolocation 미지원 브라우저');
    return;
  }
  if (geoWatchId !== null) return;

  geoWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      currentUserLocation = { lat: lat, lng: lng };
      updateMyLocationMarker(lat, lng);
    },
    function(err) {
      console.warn('[위치 추적 실패]', err.message);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000
    }
  );
  console.log('[위치 추적] 시작 (watchPosition)');
}

function stopLocationTracking() {
  if (geoWatchId !== null) {
    navigator.geolocation.clearWatch(geoWatchId);
    geoWatchId = null;
    console.log('[위치 추적] 종료');
  }
  if (myLocationMarker) {
    myLocationMarker.setMap(null);
    myLocationMarker = null;
  }
}

function updateMyLocationMarker(lat, lng) {
  const position = new kakao.maps.LatLng(lat, lng);

  if (myLocationMarker) {
    myLocationMarker.setPosition(position);
    return;
  }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
    <circle cx="11" cy="11" r="10" fill="#FFFFFF"/>
    <circle cx="11" cy="11" r="7" fill="#1A73E8"/>
  </svg>`;
  const imageSrc = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  const imageSize = new kakao.maps.Size(22, 22);
  const imageOption = { offset: new kakao.maps.Point(11, 11) };
  const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);

  myLocationMarker = new kakao.maps.Marker({
    position: position,
    image: markerImage,
    zIndex: 9999
  });
  myLocationMarker.setMap(map);
}

function moveToMyLocation() {
  if (currentUserLocation) {
    map.setCenter(new kakao.maps.LatLng(currentUserLocation.lat, currentUserLocation.lng));
    map.setLevel(4);
    return;
  }

  if (!navigator.geolocation) { alert("위치 기능을 지원하지 않는 브라우저입니다."); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    currentUserLocation = { lat: lat, lng: lng };
    updateMyLocationMarker(lat, lng);
    map.setCenter(new kakao.maps.LatLng(lat, lng));
    map.setLevel(4);
  }, function(err) {
    console.warn("위치 조회 실패:", err);
    alert("현재 위치를 가져올 수 없습니다.\n위치 권한을 허용해주세요.");
  });
}

async function loadStoresInView() {
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const latMin = sw.getLat(), latMax = ne.getLat();
  const lngMin = sw.getLng(), lngMax = ne.getLng();

  document.getElementById("statusBar").textContent = "업장 로딩 중...";

  try {
    const snap = await db.ref("stores_light").orderByChild("lat").startAt(latMin).endAt(latMax).once("value");
    const raw = snap.val() || {};
    let list = [];

    for (const k in raw) {
      const s = raw[k];
      if (!s || isNaN(s.lat) || isNaN(s.lng)) continue;
      if (s.lng < lngMin || s.lng > lngMax) continue;
      s._key = k;
      list.push(s);
    }

    list = list.filter(s => {
      if (!isClosed(s)) return true;
      const status = getVisitStatus(s);
      return status === "lead";
    });

    list = list.filter(s => isVisibleForProject(s, currentUser.key));

    if (!hasMyProjects) {
      for (const s of list) {
        if (amIAssignedToProject(s, currentUser.key)) {
          hasMyProjects = true;
          const projChip = document.getElementById('filterProject');
          if (projChip) projChip.classList.add('visible');
          break;
        }
      }
    }

    if (currentUserLocation) {
      list = list.filter(function(s) {
        if (!isContractGrade(s.grade)) return true;
        const dist = haversine(currentUserLocation.lat, currentUserLocation.lng, s.lat, s.lng);
        return dist <= CONTRACT_RADIUS_KM;
      });
    }

    list = removeContractDuplicates(list);
    allStoresInView = list;
    renderMarkers();
  } catch(e) {
    console.error("업장 로딩 오류:", e);
    document.getElementById("statusBar").textContent = "로딩 실패";
  }
}

function isVisibleForProject(store, currentPartnerKey) {
  if (!store.projects) return true;
  const keys = Object.keys(store.projects);
  if (keys.length === 0) return true;
  for (const projectName of keys) {
    const codes = String(store.projects[projectName]).split(';').map(s => s.trim());
    if (codes.indexOf(currentPartnerKey) !== -1) return true;
  }
  return false;
}

function amIAssignedToProject(store, currentPartnerKey) {
  if (!store.projects) return false;
  const keys = Object.keys(store.projects);
  if (keys.length === 0) return false;
  const myKey = String(currentPartnerKey || '').trim();
  const myCode = currentUser ? String(currentUser.code || '').trim() : '';
  for (const projectName of keys) {
    const codes = String(store.projects[projectName]).split(';').map(s => s.trim());
    if (codes.indexOf(myKey) !== -1 || (myCode && codes.indexOf(myCode) !== -1)) return true;
  }
  return false;
}

function isContractGrade(g) {
  if (!g) return false;
  const s = String(g).trim();
  return s === "기계약" || s === "업박스기계약업장" || s.indexOf("기계약") !== -1;
}

function isClosed(store) {
  return store && store.closed === true;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function removeContractDuplicates(list) {
  const contracts = list.filter(s => isContractGrade(s.grade));
  const others = list.filter(s => !isContractGrade(s.grade));
  const filteredOthers = others.filter(function(o) {
    for (const c of contracts) {
      const distM = haversine(o.lat, o.lng, c.lat, c.lng) * 1000;
      if (distM <= DUPLICATE_RADIUS_M && nameSimilarity(o.name, c.name) >= 0.7) return false;
    }
    return true;
  });
  return contracts.concat(filteredOthers);
}

function nameSimilarity(a, b) {
  if (!a || !b) return 0;
  a = String(a).replace(/\s+/g, "");
  b = String(b).replace(/\s+/g, "");
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  let matches = 0;
  for (let i = 0; i < shorter.length; i++) {
    if (longer.indexOf(shorter[i]) !== -1) matches++;
  }
  return matches / longer.length;
}

function getEffectiveStatus(store) {
  if (isAdminUser && adminViewActive && visitsAggregate && visitsAggregate.stores) {
    const aggData = visitsAggregate.stores[store._key];
    if (aggData && aggData.lastStatus) {
      if (isContractGrade(store.grade)) return "contract";
      return aggData.lastStatus;
    }
  }
  return getVisitStatus(store);
}

/* v48.0: 클러스터러 사용으로 마커 추가 방식 변경 */
function renderMarkers() {
  // 기존 마커 제거
  if (markerClusterer) markerClusterer.clear();
  markers.forEach(m => m.setMap(null));
  markers = [];
  markerByKey = {};

  labelOverlays.forEach(o => o.setMap(null));
  labelOverlays = [];
  labelByKey = {};

  let shown = 0;
  let selectedRendered = false;
  const newMarkers = [];

  for (const store of allStoresInView) {
    const status = getEffectiveStatus(store);

    if (currentFilter === "project") {
      if (!amIAssignedToProject(store, currentUser.key)) continue;
    } else if (currentFilter !== "all" && status !== currentFilter) {
      continue;
    }

    const isSelected = selectedStore && selectedStore._key === store._key;
    if (isSelected) selectedRendered = true;

    const marker = createMarker(store, status, isSelected);
    newMarkers.push(marker);
    markers.push(marker);
    markerByKey[store._key] = marker;
    shown++;

    if (isAdminUser && adminViewActive) {
      const aggData = visitsAggregate && visitsAggregate.stores ? visitsAggregate.stores[store._key] : null;
      if (aggData && aggData.lastPartnerName) {
        const label = createAdminLabel(store, aggData.lastPartnerName, status);
        labelOverlays.push(label);
        labelByKey[store._key] = label;
      }
    }
  }

  if (selectedStore && !selectedRendered) {
    const status = getEffectiveStatus(selectedStore);
    const marker = createMarker(selectedStore, status, true);
    newMarkers.push(marker);
    markers.push(marker);
    markerByKey[selectedStore._key] = marker;
  }

  // v48.0: 클러스터러에 일괄 추가
  if (markerClusterer && newMarkers.length > 0) {
    markerClusterer.addMarkers(newMarkers);
    // 백업: clustered 이벤트가 동작 안 할 경우를 대비해 약간 딜레이 후 직접 색상 재적용
    setTimeout(function() {
      try {
        const clusters = markerClusterer.getClusters ? markerClusterer.getClusters() : [];
        if (clusters && clusters.length > 0) applyClusterColors(clusters);
      } catch(e) { /* 무시 */ }
    }, 100);
  }

  updateAdminLabelVisibility();

  document.getElementById("statusBar").textContent = shown + "개 업장 표시됨";
}

function createMarker(store, status, isSelected) {
  const position = new kakao.maps.LatLng(store.lat, store.lng);
  const color = getStatusColor(status);
  const icon = getGradeIcon(store.grade);

  let svg, w, h, anchorX, anchorY, zIdx;
  if (isSelected) {
    w = 36; h = 46;
    anchorX = 18; anchorY = 46;
    zIdx = 1000;
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 32 40"><path d="M16 0.8 C7.4 0.8 0.8 7.4 0.8 16 C0.8 24.6 16 39.2 16 39.2 C16 39.2 31.2 24.6 31.2 16 C31.2 7.4 24.6 0.8 16 0.8 Z" fill="${color}" stroke="#1a1a1a" stroke-width="2.5"/><text x="16" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="white">${icon}</text></svg>`;
  } else {
    w = 26; h = 33;
    anchorX = 13; anchorY = 33;
    zIdx = 1;
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 32 40"><path d="M16 0.8 C7.4 0.8 0.8 7.4 0.8 16 C0.8 24.6 16 39.2 16 39.2 C16 39.2 31.2 24.6 31.2 16 C31.2 7.4 24.6 0.8 16 0.8 Z" fill="${color}" stroke="white" stroke-width="1.6"/><text x="16" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="white">${icon}</text></svg>`;
  }

  const imageSrc = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  const imageSize = new kakao.maps.Size(w, h);
  const imageOption = { offset: new kakao.maps.Point(anchorX, anchorY) };
  const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);
  const marker = new kakao.maps.Marker({
    position: position,
    image: markerImage,
    zIndex: zIdx
  });
  // v48.0: 클러스터 색상 계산용 status 속성 박아두기
  marker._upboxStatus = status;
  marker._upboxStoreKey = store._key;
  kakao.maps.event.addListener(marker, "click", function() { openPanel(store); });
  return marker;
}

function getStatusColor(status) {
  return {
    visit:"#4d4678",
    lead:"#43A047",
    success:"#F5B800",
    fail:"#E53935",
    contract:"#F2AC57",
    closedByMe:"#616161",
    none:"#9E9E9E"
  }[status] || "#9E9E9E";
}

function getGradeIcon(grade) {
  if (!grade) return "-";
  const g = String(grade).trim();
  if (isContractGrade(g)) return "★";
  if (g === "A등급") return "A";
  if (g === "B등급") return "B";
  if (g === "C등급") return "C";
  return "-";
}

function getVisitStatus(store) {
  if (isContractGrade(store.grade)) return "contract";
  const rec = myVisitedStoreData[store._key];
  if (!rec) return "none";
  const cur = rec.current || {};
  const outcome = String(cur.outcome || "").trim();

  if (outcome === "성사") return "success";
  if (outcome === "실패") return "fail";

  const leadFields = [cur.currentStoreName, cur.contact, cur.amount, cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
  const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);

  if (allLeadFilled) return "lead";

  if (outcome === "폐업") return "closedByMe";

  const anyField = leadFields.some(v => String(v || "").trim().length > 0) || String(cur.price || "").trim().length > 0 || String(cur.freq || "").trim().length > 0;
  if (anyField) return "visit";
  return "none";
}

function refreshMarkerSelection(previousKey, newKey) {
  if (previousKey && markerByKey[previousKey]) {
    const prevMarker = markerByKey[previousKey];
    const prevStore = allStoresInView.find(s => s._key === previousKey);
    if (prevStore) {
      // 클러스터러에서 제거
      if (markerClusterer) markerClusterer.removeMarker(prevMarker);
      prevMarker.setMap(null);
      const status = getEffectiveStatus(prevStore);
      const newMarker = createMarker(prevStore, status, false);
      if (markerClusterer) markerClusterer.addMarker(newMarker);
      markerByKey[previousKey] = newMarker;
      const idx = markers.indexOf(prevMarker);
      if (idx !== -1) markers[idx] = newMarker;
    }
  }

  if (newKey && markerByKey[newKey]) {
    const newSelMarker = markerByKey[newKey];
    if (markerClusterer) markerClusterer.removeMarker(newSelMarker);
    newSelMarker.setMap(null);
    const newStore = allStoresInView.find(s => s._key === newKey) || selectedStore;
    if (newStore) {
      const status = getEffectiveStatus(newStore);
      const newMarker = createMarker(newStore, status, true);
      // 선택된 마커는 클러스터러 안 거치고 직접 표시 (항상 보이게)
      newMarker.setMap(map);
      markerByKey[newKey] = newMarker;
      const idx = markers.indexOf(newSelMarker);
      if (idx !== -1) markers[idx] = newMarker;
    }
  } else if (newKey && selectedStore) {
    const status = getEffectiveStatus(selectedStore);
    const newMarker = createMarker(selectedStore, status, true);
    newMarker.setMap(map);
    markerByKey[newKey] = newMarker;
    markers.push(newMarker);
  }
}

function closePanel(clearSelection) {
  document.getElementById("storePanel").classList.remove("open");
  rvInstance = null;
  currentRvState = 'collapsed';

  if (clearSelection && selectedStore) {
    const previousKey = selectedStore._key;
    selectedStore = null;
    refreshMarkerSelection(previousKey, null);
  }
}

function toggleRoadview() {
  const body = document.getElementById("rvBody");
  const arrow = document.getElementById("rvToggleArrow");

  if (!body) return;

  if (currentRvState === 'collapsed') {
    body.classList.add("expanded");
    arrow.textContent = "▲";
    headerText.textContent = "🌆 현장 로드뷰";

}

function loadRoadviewForCurrentStore() {
  if (!selectedStore) return;
  const rvLoading = document.getElementById("rvLoading");
  const rvEmpty = document.getElementById("rvEmpty");
  const rvContainer = document.getElementById("roadview");

  rvLoading.style.display = "flex";
  rvEmpty.style.display = "none";
  rvContainer.innerHTML = "";

  const position = new kakao.maps.LatLng(selectedStore.lat, selectedStore.lng);
  const rvClient = new kakao.maps.RoadviewClient();

  rvClient.getNearestPanoId(position, 50, function(panoId) {

function buildKakaoNavUrl(store) {
  const name = String(store.name || '업장').replace(/[,/]/g, ' ').trim();
  return `https://map.kakao.com/link/to/${name},${store.lat},${store.lng}`;
}

function openKakaoNav(store) {
  const appScheme = `kakaomap://route?ep=${store.lat},${store.lng}&by=car`;
  const webFallback = buildKakaoNavUrl(store);

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if (!isMobile) {
    window.open(webFallback, '_blank');
    return;
  }

  const startTime = Date.now();
  const fallbackTimer = setTimeout(function() {
    if (document.hidden || document.webkitHidden) return;
    if (Date.now() - startTime < 1400) return;
    window.location.href = webFallback;
  }, 1500);

  document.addEventListener('visibilitychange', function onVis() {
    if (document.hidden) {
      clearTimeout(fallbackTimer);
      document.removeEventListener('visibilitychange', onVis);
    }
  });

  window.location.href = appScheme;
}

async function generateSSOToken(partnerName, partnerCode) {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
  const kst = new Date(utc + 9 * 60 * 60 * 1000);
  const yyyy = kst.getFullYear();
  const mm = String(kst.getMonth() + 1).padStart(2, '0');
  const dd = String(kst.getDate()).padStart(2, '0');
  const today = yyyy + mm + dd;

  const raw = partnerName + '|' + partnerCode + '|' + today + '|' + SSO_SECRET;

  const encoder = new TextEncoder();
  const data = encoder.encode(raw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));

  return hashArray.slice(0, 8)
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

async function openPriceGuide() {
  if (!selectedStore) return;
  if (!currentUser || !currentUser.name || !currentUser.code) {
    alert('로그인 정보를 확인할 수 없습니다. 다시 로그인해주세요.');
    return;
  }

  try {
    const token = await generateSSOToken(currentUser.name, currentUser.code);

    const params = new URLSearchParams();
    params.append('sso', '1');
    params.append('partner_name', currentUser.name);
    params.append('partner_code', currentUser.code);
    params.append('token', token);
    if (selectedStore.sido) params.append('sido', selectedStore.sido);
    if (selectedStore.sigungu) params.append('sidodong', selectedStore.sigungu);
    if (selectedStore.gu) params.append('gueup', selectedStore.gu);
    else params.append('gueup', '없음');
    if (selectedStore.emd) params.append('dong', selectedStore.emd);
    params.append('service', '베이직');

    const url = PRICE_GUIDE_URL + '?' + params.toString();
    window.open(url, '_blank');
  } catch(err) {
    console.error('영업기준표 이동 실패:', err);
    alert('영업기준표를 여는 중 오류가 발생했습니다.\n' + (err.message || ''));
  }
}

      <label><span style="color:#E53935;">*</span> 비닐 사용여부</label>
      <select id="v_vinyl">
        <option value="">선택</option>
        <option value="사용">사용</option>
        <option value="미사용">미사용</option>
        <option value="지자체">지자체</option>
        <option value="처리기">처리기</option>
      </select>
      <label><span style="color:#E53935;">*</span> 5톤 차량 진입 가능여부</label>
      <select id="v_truck">
        <option value="">선택</option>
        <option value="가능">가능</option>
        <option value="불가능">불가능</option>
      </select>
      <label>상세 상담내용</label>
      <textarea id="v_note" placeholder="상담 내용을 기록하세요"></textarea>
      <label>최종영업결과</label>
      <select id="v_outcome">
        <option value="">선택</option>
        <option value="성사">성사</option>
        <option value="실패">실패</option>
        <option value="폐업">폐업</option>
      </select>
      <button class="save-btn" id="saveVisitBtn">저장</button>
    </div>`;
}

function loadMyVisit(store) {
  const rec = myVisitedStoreData[store._key];
  if (!rec) {
    const dateEl = document.getElementById("visitDates");
    if (dateEl) dateEl.textContent = "";
    return;
  }
  const cur = rec.current || {};
  setVal("v_currentStoreName", cur.currentStoreName);
  setVal("v_contact", cur.contact);
  setVal("v_amount", cur.amount);
  setVal("v_price", cur.price);
  setVal("v_suggestedPrice", cur.suggestedPrice);
  setVal("v_freq", cur.freq);
  setVal("v_bins", cur.bins);
  setVal("v_vinyl", cur.vinyl);
  setVal("v_truck", cur.truck);
  setVal("v_note", cur.note);
  setVal("v_outcome", cur.outcome);

  const first = rec.firstVisitAt ? formatDate(rec.firstVisitAt) : '';
  const last = rec.lastUpdatedAt ? formatDate(rec.lastUpdatedAt) : '';
  const dateText = first && last && first !== last ? `최초 방문: ${first} · 마지막 수정: ${last}` : (first ? `최초 방문: ${first}` : '');
  const dateEl = document.getElementById("visitDates");
  if (dateEl) dateEl.textContent = dateText;
}

function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v || ""; }

function bindVisitForm(store) {
  const btn = document.getElementById("saveVisitBtn");
  if (!btn) return;
  btn.onclick = function() { saveVisit(store); };

  const contactInput = document.getElementById("v_contact");
  if (contactInput) {
    contactInput.addEventListener("input", function(e) {
      let v = e.target.value.replace(/[^0-9]/g, "");
      if (!v) { e.target.value = ""; return; }

      const mobilePrefix = ["010", "011", "016", "017", "018", "019"];
      const prefix3 = v.substring(0, 3);

      if (mobilePrefix.indexOf(prefix3) !== -1) {
        if (v.length <= 3) {
          e.target.value = v;
        } else if (v.length <= 7) {
          e.target.value = v.substring(0, 3) + "-" + v.substring(3);
        } else {
          if (prefix3 === "010") {
            e.target.value = v.substring(0, 3) + "-" + v.substring(3, 7) + "-" + v.substring(7, 11);
          } else {
            if (v.length === 11) {
              e.target.value = v.substring(0, 3) + "-" + v.substring(3, 7) + "-" + v.substring(7, 11);
            } else {
              e.target.value = v.substring(0, 3) + "-" + v.substring(3, 6) + "-" + v.substring(6, 10);
            }
          }
        }
      } else {
        e.target.value = v;
      }
    });
  }
}

async function saveVisit(store) {
  const btn = document.getElementById("saveVisitBtn");
  btn.disabled = true;
  btn.textContent = "저장 중...";

  const currentData = {
    currentStoreName: getVal("v_currentStoreName"),
    contact: getVal("v_contact"),
    amount: getVal("v_amount"),
    price: getVal("v_price"),
    suggestedPrice: getVal("v_suggestedPrice"),
    freq: getVal("v_freq"),
    bins: getVal("v_bins"),
    vinyl: getVal("v_vinyl"),
    truck: getVal("v_truck"),
    note: getVal("v_note"),
    outcome: getVal("v_outcome"),
    updatedAt: Date.now()
  };

  const recKey = "REC_" + currentUser.key + "_" + store._key;
  const recRef = db.ref("visits/" + currentUser.key + "/" + recKey);

  try {
    const existingSnap = await recRef.once("value");
    const existing = existingSnap.val();
    const now = Date.now();

    let payload;
    if (existing) {
      const history = existing.history || [];
      if (existing.current) history.push(Object.assign({}, existing.current, { savedAt: existing.current.updatedAt || now }));
      payload = {
        storeKey: store._key,
        storeName: store.name || '',
        storeAddress: store.address || '',
        partnerName: currentUser.name,
        partnerKey: currentUser.key,
        firstVisitAt: existing.firstVisitAt || now,
        lastUpdatedAt: now,
        current: currentData,
        history: history
      };
    } else {
      payload = {
        storeKey: store._key,
        storeName: store.name || '',
        storeAddress: store.address || '',
        partnerName: currentUser.name,
        partnerKey: currentUser.key,
        firstVisitAt: now,
        lastUpdatedAt: now,
        current: currentData,
        history: []
      };
    }

    await recRef.set(payload);
    myVisitedStoreData[store._key] = payload;
    renderMarkers();
    updateChipCounts();

    btn.textContent = "✓ 저장됨";
    setTimeout(function() { btn.textContent = "저장"; btn.disabled = false; }, 1500);

    const first = formatDate(payload.firstVisitAt);
    const last = formatDate(payload.lastUpdatedAt);
    const dateEl = document.getElementById("visitDates");
    if (dateEl) dateEl.textContent = first !== last ? `최초 방문: ${first} · 마지막 수정: ${last}` : `최초 방문: ${first}`;
  } catch(e) {
    console.error("저장 오류:", e);
    alert("저장 실패: " + e.message);
    btn.textContent = "저장";
    btn.disabled = false;
  }
}

function getVal(id) { const el = document.getElementById(id); return el ? el.value.trim() : ""; }

async function searchStores(q) {
  try {
    const snap = await db.ref("stores_light").orderByChild("name").startAt(q).endAt(q + '\uf8ff').limitToFirst(30).once("value");
    const raw = snap.val() || {};
    let list = [];
    for (const k in raw) {
      const s = raw[k];
      if (!s) continue;
      s._key = k;
      list.push(s);
    }
    list = list.filter(s => {
      if (!isClosed(s)) return true;
      const status = getVisitStatus(s);
      return status === "lead";
    });
    list = removeContractDuplicates(list);
    renderSearchResults(list);
  } catch(e) { console.error("검색 오류:", e); }
}

function renderSearchResults(list) {
  const resultsEl = document.getElementById("searchResults");
  if (list.length === 0) {
    resultsEl.innerHTML = '<div class="search-item search-empty" style="color:#999; padding:14px 12px; line-height:1.5;">검색 결과가 없습니다.<br><span style="color:#F2AC57; font-weight:600;">＋ 업장추가</span> 버튼으로 추가해주세요.</div>';
    resultsEl.style.display = "block";
    return;
  }
  resultsEl.innerHTML = list.map(function(s, idx) {
    const status = getEffectiveStatus(s);
    const statusColor = getStatusColor(status);
    const statusLabel = getStatusLabel(status);

    const projectTag = amIAssignedToProject(s, currentUser.key) ? '<span class="search-project-tag">🎯</span>' : '';

    return `<div class="search-item" data-idx="${idx}">
      <div class="search-name-row">
        <span class="search-status-dot" style="background:${statusColor};"></span>
        <span class="search-name">${escapeHtml(s.name || '(이름 없음)')}</span>
        ${projectTag}
        <span class="search-status-label" style="background:${statusColor};">${statusLabel}</span>
      </div>
    </div>`;
  }).join('');
  resultsEl.querySelectorAll(".search-item").forEach(function(el) {
    el.onclick = function() {
      const idx = parseInt(el.dataset.idx, 10);
      const s = list[idx];
      if (!s) return;
      resultsEl.style.display = "none";
      document.getElementById("searchInput").value = "";
      map.setCenter(new kakao.maps.LatLng(s.lat, s.lng));
      map.setLevel(3);
      openPanel(s);
    };
  });
  resultsEl.style.display = "block";
}

function getStatusLabel(status) {
  return {
    visit: "단순방문",
    lead: "유효리드",
    success: "계약성사",
    fail: "최종불발",
    closedByMe: "폐업",
    contract: "기계약",
    none: "미방문"
  }[status] || "미방문";
}

function formatDate(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
