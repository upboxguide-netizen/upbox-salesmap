<style>

  #loginScreen { position:fixed; inset:0; background:linear-gradient(135deg, #363859 0%, #262840 100%); display:flex; align-items:center; justify-content:center; z-index:9999; }
  #loginBox { background:#fff; border-radius:16px; padding:32px 24px; width:88%; max-width:360px; box-shadow:0 10px 40px rgba(0,0,0,.2); }

  /* 검색 결과 드롭다운 */

  #map { width:100%; height:100%; }

  /* 우측 하단 플로팅 버튼 (위치/업장추가) */
  #myLocBtn { position:absolute; right:14px; bottom:120px; width:44px; height:44px; background:#fff; border:none; border-radius:50%; box-shadow:0 2px 8px rgba(0,0,0,.2); font-size:20px; cursor:pointer; z-index:50; }
  #addStoreBtn { position:absolute; right:14px; bottom:68px; height:44px; padding:0 16px; background:#F2AC57; border:none; border-radius:22px; box-shadow:0 2px 8px rgba(0,0,0,.2); font-size:13px; color:#fff; cursor:pointer; z-index:50; font-weight:700; font-family: inherit; white-space:nowrap; }

  #saveBtn { width:100%; padding:13px; background:#F2AC57; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; font-family: inherit; }

  #saveBtn:disabled { background:#aaa; }
  #saveMsg { text-align:center; font-size:13px; margin-top:8px; min-height:18px; }

  /* 길찾기 버튼 (아웃라인 스타일) */
  #navBtn { width:100%; padding:12px; background:#fff; color:#363859; border:1.5px solid #363859; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; font-family: inherit; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
  #navBtn:active { background:#363859; color:#fff; }
  #navBtn:disabled { border-color:#aaa; color:#aaa; cursor:not-allowed; }

  /* 영업기준표 확인 버튼 (필 스타일, 브랜드 포인트 컬러) */
  .priceGuideBtn { width:100%; padding:12px; background:#F2AC57; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; font-family: inherit; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
  .priceGuideBtn:active { background:#e09a46; }
  .priceGuideBtn:disabled { background:#bbb; cursor:not-allowed; }

  /* 저장 토스트 (화면 중앙 고정, 스크롤 영향 없음) */
  #saveToast { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(54,56,89,0.95); color:#fff; padding:16px 28px; border-radius:12px; font-size:15px; font-weight:600; z-index:10000; opacity:0; pointer-events:none; transition:opacity .25s; box-shadow:0 4px 20px rgba(0,0,0,.3); font-family: inherit; }
  #saveToast.show { opacity:1; }
  #saveToast.success { background:rgba(54,56,89,0.95); }
  #saveToast.error { background:rgba(198,40,40,0.95); }
</style>

<body>

<div id="loginScreen">
  <div id="loginBox">
    <h1>업박스 영업 지도</h1>
    <p class="sub">파트너 전용 CRM 시스템</p>
    <input id="partnerName" type="text" placeholder="파트너명" autocomplete="off">
    <input id="partnerCode" type="password" placeholder="파트너사 코드" autocomplete="off">
    <button id="loginBtn" onclick="doLogin()">로그인</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="title">업박스 영업 지도</div>
    <div class="user" id="userName"></div>
    <button class="logout" onclick="doLogout()">로그아웃</button>
  </div>

  <input id="searchInput" type="text" placeholder="🔍 전국 업장명 검색" oninput="onSearch()" onfocus="onSearchFocus()" autocomplete="off">
  <div id="searchResults"></div>

  <div id="filterBar">
    <div class="filterChip active" data-grade="ALL" onclick="setFilter('ALL')">전체</div>
    <div class="filterChip" data-grade="VISITED" onclick="setFilter('VISITED')">단순방문</div>
    <div class="filterChip" data-grade="LEAD" onclick="setFilter('LEAD')">유효리드</div>
    <div class="filterChip" data-grade="SUCCESS" onclick="setFilter('SUCCESS')">계약성사</div>
    <div class="filterChip" data-grade="FAIL" onclick="setFilter('FAIL')">최종불발</div>
    <div class="filterChip" data-grade="기계약" onclick="setFilter('기계약')">기계약</div>
  </div>

  <div id="map"></div>

  <button id="myLocBtn" onclick="moveToMyLocation()" title="현재 위치">📍</button>
  <button id="addStoreBtn" onclick="openAddStoreLink()" title="지도에 없는 업장 추가">＋ 업장추가</button>

  <div id="statusBar">로딩 중...</div>
</div>

<div id="storePanel">
  <div id="panelHandle"></div>
  <button id="panelClose" onclick="closePanel()">×</button>
  <div id="panelContent"></div>
</div>

<!-- 저장 완료/실패 토스트 (화면 중앙 고정) -->
<div id="saveToast"></div>

<script>
/* ==================== Firebase 초기화 ==================== */
const firebaseConfig = {
  apiKey: "AIzaSyA1TKLHcnnXgwQVNId4pkLSi0QrE-KW7RU",
  authDomain: "localsales-map.firebaseapp.com",
  databaseURL: "https://localsales-map-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "localsales-map",
  storageBucket: "localsales-map.firebasestorage.app",
  messagingSenderId: "1077741182559",
  appId: "1:1077741182559:web:c07eb3d853676fe59c45ea"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ==================== 전역 상태 ==================== */
let currentUser = null;
let map = null;
let markers = [];
let allStoresInView = [];
let currentFilter = 'ALL';
let currentKeyword = '';
let selectedStore = null;
let userLocationMarker = null;
let myVisitedStoreKeys = {};   // 내가 방문기록 남긴 업장 키 { storeKey: true }
let myVisitedStoreData = {};   // 내 방문기록 상세 { storeKey: { contact, note, ... } } — 유효리드 판별용
let otherLastContactByStore = {};  // 타 파트너 최근 접촉일자 맵 { sanitizedStoreKey: timestampMs }

/* ==================== 업장 추가 링크 ==================== */
// 지도에 없는 업장 신규 등록 링크 (Walla 폼)
const ADD_STORE_URL = "https://walla.my/v/GEQSSOWtFYHulcSoAKC3";

function openAddStoreLink(){
  window.open(ADD_STORE_URL, "_blank");
}

/* ==================== 영업기준표 웹앱 연동 ==================== */
// UpBox 영업기준표 웹앱 URL (doGet이 ?sido=...&sidodong=...&gueup=...&dong=...&service=... 파라미터 수신)
const PRICE_GUIDE_BASE_URL = "https://script.google.com/macros/s/AKfycbx09Kv-N_Jk0fOpnoP2AdCXnYVICdJcYusk0611Y_EZVccTfin_1uk5nXSKBFkZpd9c/exec";

// 업장의 시도/시군구/구/읍면동 + 상품(베이직/플러스) 으로 영업기준표 자동 조회
// - store.sido/sigungu/gu/emd (Firebase stores 필드) 와 선택된 상품으로 URL 파라미터 조립
// - 새 탭으로 오픈 → 웹앱이 자동으로 해당 지역/상품의 기준표를 조회해서 표시
// - service 파라미터는 기본값 "베이직" (플러스만 쓰는 업장은 명시적으로 전환 가능)
function openPriceGuide(service){
  if (!selectedStore) return;

  const sido = (selectedStore.sido || "").trim();
  const sigungu = (selectedStore.sigungu || "").trim();
  const gu = (selectedStore.gu || "").trim();
  const emd = (selectedStore.emd || "").trim();
  const svc = service || "베이직";

  // 최소한 시도와 읍면동이 있어야 의미 있는 조회가 됨
  if (!sido || !emd){
    showToast("⚠️ 지역 정보가 부족해 자동 조회가 불가합니다. 웹앱에서 수동 선택해주세요.", "error");
    // 그래도 열어주긴 함 (수동 조회 가능)
    window.open(PRICE_GUIDE_BASE_URL, "_blank");
    return;
  }

  // URL 파라미터 조립 (영업기준표 웹앱 doGet이 받는 이름과 정확히 일치해야 함)
  //   sido      = 시도 (예: 경기도)
  //   sidodong  = 시군구 (영업기준표 RAW 상의 컬럼명이 "시/군/구" 이지만 캐시키는 sidodong)
  //   gueup     = 구/읍 (값이 없는 지역은 빈 문자열로 보내면 웹앱 쪽에서 "없음"으로 매핑)
  //   dong      = 읍면동
  //   service   = 베이직 | 플러스
  const params = new URLSearchParams({
    sido: sido,
    sidodong: sigungu,
    gueup: gu,
    dong: emd,
    service: svc
  });

  window.open(PRICE_GUIDE_BASE_URL + "?" + params.toString(), "_blank");
}

/* ==================== 유틸 ==================== */
function sanitizeKey(s){ return String(s||"").replace(/[.#$\[\]\/]/g,"_"); }

// 실제 Firebase에 저장된 등급 값을 표준 값으로 정규화
function normalizeGrade(raw){
  const g = String(raw||"").trim();
  if (g === "업박스기계약업장" || g === "기계약" || g === "기계약업장") return "기계약";
  if (g === "A" || g === "A등급") return "A";
  if (g === "B" || g === "B등급") return "B";
  if (g === "C" || g === "C등급") return "C";
  return "미지정";
}

// 등급 정보
// 색상 규칙: A/B/C/미지정 모두 회색 기본. 기계약만 주황.
// (단순방문/유효리드/계약성사/최종불발 색상은 makeMarkerImage 에서 우선 적용)
function gradeInfo(raw){
  const g = normalizeGrade(raw);
  if (g === "기계약") return { label:"★ 기계약", color:"#F2AC57", text:"#fff", icon:"★" };
  if (g === "A")     return { label:"A등급",     color:"#9E9E9E", text:"#fff", icon:"A" };
  if (g === "B")     return { label:"B등급",     color:"#9E9E9E", text:"#fff", icon:"B" };
  if (g === "C")     return { label:"C등급",     color:"#9E9E9E", text:"#fff", icon:"C" };
  return               { label:"미지정",         color:"#9E9E9E", text:"#fff", icon:"-" };
}

// 베이직/플러스 ON 여부 판정 (다양한 입력값 허용)
function isOnValue(v){
  if (v === true) return true;
  const s = String(v||"").trim().toUpperCase();
  if (!s) return false;
  return ["ON", "Y", "YES", "O", "가능", "사용", "1", "TRUE"].indexOf(s) !== -1;
}

// status: 'FAIL' | 'SUCCESS' | 'LEAD' | 'VISITED' | null
// 우선순위: 기계약(주황 별) > 최종불발(빨강) > 계약성사(진노랑) > 유효리드(녹색) > 단순방문(보라) > 미방문(회색)
function makeMarkerImage(grade, status){
  const g = gradeInfo(grade);
  let color = g.color;
  let text = g.text;
  const icon = g.icon;

  if (normalizeGrade(grade) !== "기계약"){
    if (status === 'FAIL'){ color = "#E53935"; text = "#fff"; }
    else if (status === 'SUCCESS'){ color = "#F5B800"; text = "#fff"; }
    else if (status === 'LEAD'){ color = "#43A047"; text = "#fff"; }
    else if (status === 'VISITED'){ color = "#4d4678"; text = "#fff"; }
    // 미방문 상태는 등급색(회색 또는 미지정 회색) 그대로 유지
  }

  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46">'
    + '<path d="M18 0 C8 0 0 8 0 18 C0 30 18 46 18 46 C18 46 36 30 36 18 C36 8 28 0 18 0 Z" fill="' + color + '" stroke="#fff" stroke-width="2"/>'
    + '<text x="18" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="' + text + '" font-family="Arial">' + icon + '</text>'
    + '</svg>';
  const url = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
  return new kakao.maps.MarkerImage(url, new kakao.maps.Size(36,46), { offset:new kakao.maps.Point(18,46) });
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

/* ==================== 문자열 유사도 (기계약 중복 판정용) ==================== */
// 업장명 정규화: 공백/특수문자 제거, 소문자 변환
function normalizeName(s){
  return String(s||"").toLowerCase().replace(/[\s\(\)\[\]\-\_\.\,·・&]+/g, "");
}

// 2-gram(bigram) 기반 Dice 유사도 (한글/영문 친화적)
function nameSimilarity(a, b){
  const na = normalizeName(a), nb = normalizeName(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (na.length < 2 || nb.length < 2){
    // 너무 짧으면 포함관계로 판정
    return (na.indexOf(nb) !== -1 || nb.indexOf(na) !== -1) ? 1 : 0;
  }
  const bigrams = function(s){
    const arr = [];
    for (let i=0; i<s.length-1; i++) arr.push(s.slice(i, i+2));
    return arr;
  };
  const A = bigrams(na), B = bigrams(nb);
  const mapB = {};
  B.forEach(function(g){ mapB[g] = (mapB[g]||0) + 1; });
  let match = 0;
  for (let i=0; i<A.length; i++){
    const g = A[i];
    if (mapB[g] && mapB[g] > 0){ match++; mapB[g]--; }
  }
  return (2 * match) / (A.length + B.length);
}

// 타 파트너(현재 로그인 파트너 제외)의 업장별 최근 접촉일자를 { sanitizedStoreKey: timestampMs } 로 캐싱
// - 파트너 개인정보/접촉 내용은 절대 저장하지 않음, 오직 "최근 접촉 시각(ms)" 만 저장
// - visits/ 전체 한 번 스캔 (파트너 10명 내외 규모에서 비용 낮음)
async function loadOtherPartnersLastContact(){
  try {
    const snap = await db.ref("visits").once("value");
    const all = snap.val() || {};
    otherLastContactByStore = {};

    for (const partnerKey in all){
      // 본인 방문기록은 건너뜀
      if (partnerKey === currentUser.key) continue;

      const records = all[partnerKey] || {};
      for (const recKey in records){
        const r = records[recKey];
        if (!r || !r.storeKey) continue;

        // 해당 업장에 대한 해당 파트너의 최근 접촉 시각 구하기
        // 우선순위: lastUpdatedAt → current.updatedAt → updatedAt(구버전) → firstVisitAt
        let ts = null;
        if (r.lastUpdatedAt) ts = Number(r.lastUpdatedAt);
        else if (r.current && r.current.updatedAt) ts = Number(r.current.updatedAt);
        else if (r.updatedAt) ts = Number(r.updatedAt);
        else if (r.firstVisitAt) ts = Number(r.firstVisitAt);
        if (!ts || isNaN(ts)) continue;

        const sk = sanitizeKey(r.storeKey);
        // 동일 업장에 여러 타 파트너 기록이 있으면 가장 최근(큰 timestamp)만 유지
        if (!otherLastContactByStore[sk] || ts > otherLastContactByStore[sk]){
          otherLastContactByStore[sk] = ts;
        }
      }
    }
  } catch(e){ console.error("타 파트너 접촉일자 로드 실패:", e); }
}

// timestampMs → "yyyy-mm-dd" 포맷 (업장 패널/방문일자 표시 공통 포맷)
function formatDateYmd(ms){
  if (!ms) return "";
  const d = new Date(ms);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

// 현재 로그인한 파트너가 저장한 방문기록 로드 (키 + 상세 데이터)
async function loadMyVisitedKeys(){
  try {
    const snap = await db.ref("visits/" + currentUser.key).once("value");
    const data = snap.val() || {};
    myVisitedStoreKeys = {};
    myVisitedStoreData = {};
    for (const recKey in data){
      const r = data[recKey];
      if (r && r.storeKey){
        const sk = sanitizeKey(r.storeKey);
        myVisitedStoreKeys[sk] = true;
        // 상태 판별용 전체 필드 캐싱 (영업정보 전반을 LEAD 판정에 활용)
        // 새 구조(current)가 있으면 오직 current 만 사용 (구 평탄 필드 무시 → 삭제된 값이 남아있는 버그 방지)
        const d = r.current ? r.current : r;
        myVisitedStoreData[sk] = {
          contact: d.contact || "",
          note: d.note || "",
          outcome: d.outcome || "",      // '성사' | '실패' | ''
          amount: d.amount || "",        // 월예상배출량
          price: d.price || "",          // 현재단가
          freq: d.freq || "",            // 주수거횟수
          bins: d.bins || "",            // 통갯수
          vinyl: d.vinyl || "",          // 비닐사용여부
          truck: d.truck || ""           // 5톤차량진입
        };
      }
    }
  } catch(e){ console.error("방문기록 키 로드 실패:", e); }
}

// 방문 업장의 영업 상태 판별
// 우선순위: 최종불발(FAIL) > 계약성사(SUCCESS) > 유효리드(LEAD) > 단순방문(VISITED) > null(미방문처럼)
//
// 판정 규칙:
// - outcome이 "실패" → FAIL
// - outcome이 "성사" → SUCCESS
// - outcome 빈값 + (연락처 OR 특이사항) 있음 → LEAD
// - outcome 빈값 + 연락처/특이사항 없음 + (월배출량/단가/주수거/통갯수/비닐/차량) 중 하나 이상 → VISITED
// - 위 모두 해당 없음 (방문기록은 저장되었으나 모든 필드 비어있음) → null (재방문 대상, 회색핀)
//
// 공백 문자열은 없는 것으로 간주 → 과거 입력 삭제 시 자동 하향 조정됨
function getVisitStatus(storeKey){
  const sk = sanitizeKey(storeKey);
  if (!myVisitedStoreKeys[sk]) return null;
  const d = myVisitedStoreData[sk];
  if (!d) return null;

  const outcome = String(d.outcome||"").trim();
  if (outcome === "실패") return 'FAIL';
  if (outcome === "성사") return 'SUCCESS';

  const hasContact = String(d.contact||"").trim().length > 0;
  const hasNote = String(d.note||"").trim().length > 0;
  if (hasContact || hasNote) return 'LEAD';

  // 연락처·특이사항은 없지만 다른 영업정보(관찰값)가 있으면 단순방문
  const obsFields = [d.amount, d.price, d.freq, d.bins, d.vinyl, d.truck];
  const hasObservation = obsFields.some(function(v){ return String(v||"").trim().length > 0; });
  if (hasObservation) return 'VISITED';

  // 모든 필드 비어있음 → 재방문 대상 (회색핀)
  return null;
}

/* ==================== 지도 ==================== */
function initMap(){
  const container = document.getElementById("map");
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5
  });

  let moveTimer = null;
  kakao.maps.event.addListener(map, 'idle', function(){
    clearTimeout(moveTimer);
    moveTimer = setTimeout(loadStoresInView, 400);
  });

  // 지도의 빈 영역 클릭 시 상세 패널 닫기
  kakao.maps.event.addListener(map, 'click', function(){
    closePanel();
  });

  moveToMyLocation();
}

function moveToMyLocation(){
  if (!navigator.geolocation){
    setStatus("⚠️ 이 브라우저는 위치 서비스를 지원하지 않습니다.");
    return;
  }
  setStatus("📍 현재 위치 확인 중...");
  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const loc = new kakao.maps.LatLng(lat, lng);
      map.setCenter(loc);
      map.setLevel(4);

      if (userLocationMarker) userLocationMarker.setMap(null);
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="#4285F4" stroke="#fff" stroke-width="3"/></svg>';
      userLocationMarker = new kakao.maps.Marker({
        position: loc,
        map: map,
        image: new kakao.maps.MarkerImage(
          "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          new kakao.maps.Size(20,20),
          { offset: new kakao.maps.Point(10,10) }
        ),
        zIndex: 999
      });
    },
    function(err){ setStatus("⚠️ 위치 권한이 필요합니다."); },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

/* ==================== 업장 로딩 ==================== */
async function loadStoresInView(){
  if (!map) return;
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();

  const centerLat = (sw.getLat()+ne.getLat())/2;
  const diagKm = haversine(sw.getLat(), sw.getLng(), ne.getLat(), ne.getLng());

  let minLat, maxLat;
  if (diagKm > 30){
    minLat = centerLat - 0.09;
    maxLat = centerLat + 0.09;
  } else {
    minLat = sw.getLat() - 0.01;
    maxLat = ne.getLat() + 0.01;
  }

  setStatus("📍 주변 업장 로딩 중...");

  try {
    // 🚀 대역폭 최적화: stores_light 에서 경량 필드(lat, lng, name, grade, basic, plus)만 조회
    // 업장 1건당 약 80 bytes (기존 stores 365 bytes 대비 78% 절감)
    const snap = await db.ref("stores_light")
      .orderByChild("lat")
      .startAt(minLat)
      .endAt(maxLat)
      .once("value");

    const data = snap.val() || {};
    const minLng = sw.getLng() - 0.01, maxLng = ne.getLng() + 0.01;

    const list = [];
    for (const key in data){
      const s = data[key];
      if (!s.lat || !s.lng) continue;
      if (s.lng < minLng || s.lng > maxLng) continue;
      s._key = key;
      list.push(s);
    }

    // 기계약 중복 노출 방지 (좌표 동일+이름 유사도 70%↑)
    const filtered = dedupeAgainstContracts(list);

    allStoresInView = filtered;
    renderMarkers();
    setStatus("✅ " + filtered.length + "개 업장 표시됨");
  } catch(e){
    setStatus("⚠️ 로딩 실패: " + e.message);
  }
}

// 같은 위경도에 기계약/비기계약이 공존하면 이름 유사도 70% 이상일 때 비기계약 제거
function dedupeAgainstContracts(list){
  const LAT_EPS = 0.00005;  // 약 5m 허용
  const LNG_EPS = 0.00006;
  const SIM_THRESHOLD = 0.7;

  const contracts = list.filter(function(s){ return normalizeGrade(s.grade) === "기계약"; });
  if (contracts.length === 0) return list;

  const removeKeys = {};
  for (let i=0; i<list.length; i++){
    const s = list[i];
    if (normalizeGrade(s.grade) === "기계약") continue;
    for (let j=0; j<contracts.length; j++){
      const c = contracts[j];
      if (Math.abs(s.lat - c.lat) > LAT_EPS) continue;
      if (Math.abs(s.lng - c.lng) > LNG_EPS) continue;
      const sim = nameSimilarity(s.name, c.name);
      if (sim >= SIM_THRESHOLD){
        removeKeys[s._key] = true;
        break;
      }
    }
  }
  return list.filter(function(s){ return !removeKeys[s._key]; });
}

function renderMarkers(){
  markers.forEach(function(m){ m.marker.setMap(null); });
  markers = [];

  allStoresInView.forEach(function(s){
    const status = getVisitStatus(s._key);  // 'FAIL' | 'SUCCESS' | 'LEAD' | 'VISITED' | null
    const isContract = normalizeGrade(s.grade) === '기계약';

    // 필터 적용
    if (currentFilter === 'VISITED'){
      // 단순방문: 방문기록은 있되 연락처/특이사항 없고 영업결과도 미선택
      if (status !== 'VISITED') return;
    } else if (currentFilter === 'LEAD'){
      if (status !== 'LEAD') return;
    } else if (currentFilter === 'SUCCESS'){
      if (status !== 'SUCCESS') return;
    } else if (currentFilter === 'FAIL'){
      if (status !== 'FAIL') return;
    } else if (currentFilter === '기계약'){
      if (!isContract) return;
    }
    // 'ALL' 이면 모두 통과

    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(s.lat, s.lng),
      image: makeMarkerImage(s.grade, status),
      map: map
    });

    kakao.maps.event.addListener(marker, 'click', function(){ openPanel(s); });
    markers.push({ marker: marker, store: s });
  });
}

function setFilter(grade){
  currentFilter = grade;
  document.querySelectorAll('.filterChip').forEach(function(el){
    el.classList.toggle('active', el.dataset.grade === grade);
  });
  renderMarkers();
}

/* ==================== 전역 업장 검색 ==================== */
let searchTimer = null;
let lastSearchKeyword = "";

function onSearchFocus(){
  // 포커스 시 기존 결과가 있으면 다시 보여주기
  const kw = document.getElementById("searchInput").value.trim();
  if (kw.length >= 1) onSearch();
}

function onSearch(){
  const kw = document.getElementById("searchInput").value.trim();
  const resultsEl = document.getElementById("searchResults");

  // 빈 입력이면 드롭다운 숨김
  if (!kw){
    resultsEl.classList.remove("show");
    resultsEl.innerHTML = "";
    return;
  }

  // 디바운싱 (300ms 타이핑 멈춘 후 검색)
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ doGlobalSearch(kw); }, 300);
}

async function doGlobalSearch(keyword){
  if (keyword === lastSearchKeyword) return;
  lastSearchKeyword = keyword;

  const resultsEl = document.getElementById("searchResults");
  resultsEl.classList.add("show");
  resultsEl.innerHTML = '<div id="searchLoading">🔍 검색 중...</div>';

  try {
    // 🚀 대역폭 최적화: stores_light 의 name 인덱스로 prefix 검색
    // 검색 결과 30건 × 80 bytes ≈ 2.4KB (기존 stores 기준 ~11KB 대비 78% 절감)
    const snap = await db.ref("stores_light")
      .orderByChild("name")
      .startAt(keyword)
      .endAt(keyword + "\uf8ff")
      .limitToFirst(30)
      .once("value");

    const data = snap.val() || {};
    const list = [];
    for (const key in data){
      const s = data[key];
      if (!s.lat || !s.lng) continue;
      s._key = key;
      list.push(s);
    }

    // 검색 결과에도 기계약 중복 제거 적용
    const dedupedList = dedupeAgainstContracts(list);
    dedupedList.sort(function(a, b){ return String(a.name||"").localeCompare(String(b.name||"")); });

    renderSearchResults(dedupedList, keyword);
  } catch(e){
    resultsEl.innerHTML = '<div id="searchEmpty">⚠️ 검색 실패: ' + e.message + '</div>';
  }
}

function renderSearchResults(list, keyword){
  const resultsEl = document.getElementById("searchResults");

  if (list.length === 0){
    resultsEl.innerHTML = '<div id="searchEmpty">"' + keyword + '"로 시작하는 업장을 찾을 수 없어요<br><span style="font-size:11px;color:#bbb;">(업장명 앞부분으로 검색해보세요)</span></div>';
    return;
  }

  const html = list.map(function(s){
    const normalizedGrade = normalizeGrade(s.grade);
    const isContract = normalizedGrade === "기계약";
    const status = getVisitStatus(s._key);

    let badge = "";
    if (isContract){
      badge = '<span class="s-grade g-contract">★ 기계약</span>';
    } else if (status === 'FAIL'){
      badge = '<span class="s-visited" style="background:#E53935;">최종불발</span>';
    } else if (status === 'SUCCESS'){
      badge = '<span class="s-visited" style="background:#F5B800;">계약성사</span>';
    } else if (status === 'LEAD'){
      badge = '<span class="s-visited" style="background:#43A047;">유효리드</span>';
    } else if (status === 'VISITED'){
      badge = '<span class="s-visited">단순방문</span>';
    }
    const safeKey = s._key.replace(/"/g, '&quot;');
    return '<div class="searchItem" onclick="selectSearchResult(\'' + encodeURIComponent(safeKey) + '\')">'
      + '<div class="s-name">' + (s.name || "(이름없음)") + ' ' + badge + '</div>'
      + '<div class="s-addr">' + (s.address || "") + '</div>'
      + '</div>';
  }).join('');

  resultsEl.innerHTML = html;

  // 캐시에 저장 (클릭 시 사용)
  window.__searchCache = {};
  list.forEach(function(s){
    window.__searchCache[s._key] = s;
  });
}

async function selectSearchResult(encodedKey){
  const key = decodeURIComponent(encodedKey);
  const lightStore = window.__searchCache && window.__searchCache[key];
  if (!lightStore) return;

  // 검색창/드롭다운 닫기
  document.getElementById("searchResults").classList.remove("show");
  document.getElementById("searchInput").value = lightStore.name || "";
  document.getElementById("searchInput").blur();

  // 지도 이동 (경량 데이터의 lat/lng만으로 충분)
  const loc = new kakao.maps.LatLng(lightStore.lat, lightStore.lng);
  map.setLevel(3);
  map.setCenter(loc);

  // 약간의 딜레이 후 패널 오픈 (패널 내부에서 상세 필드 fetch)
  setTimeout(function(){ openPanel(lightStore); }, 500);
}

// 검색창 외부 클릭 시 드롭다운 닫기
document.addEventListener("click", function(e){
  const input = document.getElementById("searchInput");
  const results = document.getElementById("searchResults");
  if (!input || !results) return;
  if (!input.contains(e.target) && !results.contains(e.target)){
    results.classList.remove("show");
  }
});

function setStatus(msg){
  document.getElementById("statusBar").textContent = msg;
}

/* ==================== 업장 상세 패널 ==================== */
async function openPanel(store){
  selectedStore = store;
  const panel = document.getElementById("storePanel");
  const content = document.getElementById("panelContent");

  const g = gradeInfo(store.grade);
  const normalizedGrade = normalizeGrade(store.grade);
  const isContract = (normalizedGrade === "기계약");

  const regBadge = store.adminType ? '<span class="badge reg">' + store.adminType + '</span>' : "";
  const gradeBadgeClass = normalizedGrade === "기계약" ? "grade-contract"
                        : normalizedGrade === "A" ? "grade-A"
                        : normalizedGrade === "B" ? "grade-B"
                        : normalizedGrade === "C" ? "grade-C" : "grade-none";
  const gradeBadge = '<span class="badge ' + gradeBadgeClass + '">' + g.label + '</span>';

  // ① 운영가능 → 베이직/플러스 결과 표시 (기계약은 숨김)
  // basic/plus 필드가 Firebase에 아직 없는 경우도 OFF로 표시됨
  let planBadges = "";
  if (!isContract){
    const hasBasic = store.basic !== undefined && store.basic !== null && String(store.basic).trim() !== "";
    const hasPlus = store.plus !== undefined && store.plus !== null && String(store.plus).trim() !== "";
    const basicOn = isOnValue(store.basic);
    const plusOn = isOnValue(store.plus);
    const basicClass = basicOn ? "plan-badge on" : "plan-badge off";
    const plusClass = plusOn ? "plan-badge on" : "plan-badge off";
    const basicLabel = hasBasic ? (basicOn ? "ON" : "OFF") : "-";
    const plusLabel = hasPlus ? (plusOn ? "ON" : "OFF") : "-";
    planBadges =
      '<span class="' + basicClass + '">베이직 ' + basicLabel + '</span>' +
      '<span class="' + plusClass + '">플러스 ' + plusLabel + '</span>';
  }

  const memoHtml = store.memo ? '<div class="memo">📝 ' + store.memo + '</div>' : "";

  // 추가 정보 (업종/면적/전화번호/예상배출량)
  const infoRows = [];
  if (store.bizType) infoRows.push({k:"업종", v:store.bizType});
  if (store.area) infoRows.push({k:"면적", v:store.area});
  if (store.phone) infoRows.push({k:"전화번호", v:store.phone});
  if (store.volume) infoRows.push({k:"예상배출량", v:store.volume});
  const infoHtml = infoRows.length > 0
    ? '<div style="margin:10px 0;">' + infoRows.map(function(r){
        return '<div style="display:flex;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">'
          + '<span style="width:80px;color:#999;">' + r.k + '</span>'
          + '<span style="flex:1;color:#333;">' + r.v + '</span></div>';
      }).join('') + '</div>'
    : "";

  // 기계약이 아닐 때만 방문기록 입력폼 표시
  const visitFormHtml = isContract ? '' : (
    '<div id="visitForm">' +
    '<h3 id="visitFormTitle">📋 내 방문기록 (' + currentUser.name + ')</h3>' +
    '<div class="form-row"><label>현재 업체명</label><input id="v_storeName" type="text" placeholder="예: ㅇㅇ환경"></div>' +
    '<div class="form-row"><label>담당자 연락처</label><input id="v_contact" type="tel" placeholder="예: 010-0000-0000"></div>' +
    '<div class="form-row"><label>월 예상배출량 (L)</label><input id="v_amount" type="number" placeholder="예: 500"></div>' +
    '<div class="form-row"><label>현재 단가 (원/L)</label><input id="v_price" type="number" placeholder="예: 150"></div>' +
    '<div class="form-row"><label>현재 주 수거횟수</label><input id="v_freq" type="number" placeholder="예: 3"></div>' +
    '<div class="form-row"><label>현재 통 갯수</label><input id="v_bins" type="number" placeholder="예: 4"></div>' +
    '<div class="form-row"><label>비닐 사용여부</label><select id="v_vinyl"><option value="">선택</option><option value="사용">사용</option><option value="미사용">미사용</option></select></div>' +
    '<div class="form-row"><label>5톤 차량 진입 가능여부</label><select id="v_truck"><option value="">선택</option><option value="가능">가능</option><option value="불가능">불가능</option></select></div>' +
    '<div class="form-row"><label>기타 특이사항</label><textarea id="v_note" placeholder="예: 상담내용, 기타 폐기물 제안사항 등 기재"></textarea></div>' +
    '<div class="form-row"><label>최종영업결과</label><select id="v_outcome"><option value="">선택</option><option value="성사">성사</option><option value="실패">실패</option></select></div>' +
    '<button id="saveBtn" onclick="saveVisit()">💾 저장</button>' +
    '<div id="saveMsg"></div>' +
    '</div>'
  );

  // 기계약 안내 문구 (방문기록 입력폼 대체)
  const contractNoticeHtml = isContract
    ? '<div style="margin-top:16px;padding:14px;background:#F2AC57;border-radius:8px;font-size:13px;color:#fff;text-align:center;font-weight:600;">★ 업박스 기계약 업장입니다</div>'
    : '';

  // 길찾기 버튼 (모든 업장 공통)
  const navBtnHtml = '<button id="navBtn" onclick="openKakaoNavigation()">카카오맵 길찾기</button>';

  // 영업기준표 확인 버튼 (모든 업장 공통, 카카오맵 길찾기 바로 위에 표시)
  // - 해당 업장의 시도/시군구/구/읍면동 + 기본 상품(베이직)으로 웹앱 자동 조회
  // - 플러스 기준표가 필요한 경우 업장별 상황에 따라 파트너가 웹앱 내에서 전환 가능
  const priceGuideBtnHtml = '<button class="priceGuideBtn" onclick="openPriceGuide()">📊 영업기준표 확인</button>';

  // 타 파트너 마지막 접촉일자 (본인 제외, 가장 최근 1건의 날짜만)
  // - 파트너명/접촉내용은 절대 노출하지 않음
  // - 기록이 없으면 섹션 숨김
  const otherTs = otherLastContactByStore[sanitizeKey(store._key)];
  const otherContactHtml = otherTs
    ? '<div style="font-size:12px;color:#666;margin-bottom:10px;">타파트너 마지막접촉일자: ' + formatDateYmd(otherTs) + '</div>'
    : '';

  content.innerHTML =
    '<h2>' + (store.name || "(이름없음)") + '</h2>' +
    '<div class="addr">' + (store.address || "") + '</div>' +
    '<div style="margin-bottom:10px;">' + regBadge + gradeBadge + '</div>' +
    otherContactHtml +
    (planBadges ? '<div style="margin-bottom:10px;">' + planBadges + '</div>' : '') +
    infoHtml +
    memoHtml +
    priceGuideBtnHtml +
    navBtnHtml +
    contractNoticeHtml +
    visitFormHtml;

  panel.classList.add("open");
  if (!isContract) await loadMyVisit(store._key);
}

function closePanel(){
  document.getElementById("storePanel").classList.remove("open");
  selectedStore = null;
}

/* ==================== 카카오맵 길찾기 연결 ==================== */
// 선택된 업장으로 카카오맵 길찾기 열기
// - 웹 URL 방식 사용 (PC/모바일 자동 분기, 앱 설치 시 자동 앱 실행)
// - 현재 위치를 출발지로, 선택 업장을 도착지로 설정
function openKakaoNavigation(){
  if (!selectedStore) return;

  const destName = encodeURIComponent(selectedStore.name || "도착지");
  const destLat = selectedStore.lat;
  const destLng = selectedStore.lng;

  if (!destLat || !destLng){
    showToast("⚠️ 업장 위치 정보가 없습니다", "error");
    return;
  }

  showToast("현재 위치 확인 중...", "success");

  if (!navigator.geolocation){
    // 위치 서비스 없으면 도착지만 표시
    const url = "https://map.kakao.com/link/to/" + destName + "," + destLat + "," + destLng;
    window.open(url, "_blank");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      const fromLat = pos.coords.latitude;
      const fromLng = pos.coords.longitude;
      const fromName = encodeURIComponent("현재 위치");
      // 카카오맵 길찾기 웹 URL: to/도착지,위도,경도/from/출발지,위도,경도
      const url = "https://map.kakao.com/link/to/" + destName + "," + destLat + "," + destLng
                + "/from/" + fromName + "," + fromLat + "," + fromLng;
      window.open(url, "_blank");
    },
    function(err){
      // 위치 권한 거부/실패 시: 출발지 없이 도착지만 지정
      const url = "https://map.kakao.com/link/to/" + destName + "," + destLat + "," + destLng;
      window.open(url, "_blank");
      showToast("⚠️ 위치 권한이 없어 도착지만 표시됩니다", "error");
    },
    { enableHighAccuracy:true, timeout:5000 }
  );
}

async function loadMyVisit(storeKey){
  try {
    const recKey = "REC_" + currentUser.key + "_" + sanitizeKey(storeKey);
    const snap = await db.ref("visits/" + currentUser.key + "/" + recKey).once("value");
    const v = snap.val();
    if (!v) return;

    // 새 구조(current)가 있으면 그것을 우선, 없으면 구버전 평탄 구조 사용
    const data = v.current || v;

    if (data.currentStoreName !== undefined) document.getElementById("v_storeName").value = data.currentStoreName;
    if (data.contact !== undefined){
      const el = document.getElementById("v_contact");
      if (el) el.value = data.contact;
    }
    if (data.amount !== undefined) document.getElementById("v_amount").value = data.amount;
    if (data.price !== undefined) document.getElementById("v_price").value = data.price;
    if (data.freq !== undefined) document.getElementById("v_freq").value = data.freq;
    if (data.bins !== undefined){
      const el = document.getElementById("v_bins");
      if (el) el.value = data.bins;
    }
    if (data.vinyl !== undefined) document.getElementById("v_vinyl").value = data.vinyl;
    if (data.truck !== undefined){
      const el = document.getElementById("v_truck");
      if (el) el.value = data.truck;
    }
    if (data.note !== undefined) document.getElementById("v_note").value = data.note;
    if (data.outcome !== undefined){
      const el = document.getElementById("v_outcome");
      if (el) el.value = data.outcome;
    }

    // 최초/마지막 방문일자 표시
    const firstMs = v.firstVisitAt || v.updatedAt;
    const lastMs = v.lastUpdatedAt || v.updatedAt;
    if (firstMs) updateVisitTitleDates(firstMs, lastMs);
  } catch(e){ console.error(e); }
}

async function saveVisit(){
  if (!selectedStore) return;
  const btn = document.getElementById("saveBtn");
  const msg = document.getElementById("saveMsg");
  btn.disabled = true;
  btn.textContent = "저장 중...";
  msg.textContent = "";

  try {
    const recKey = "REC_" + currentUser.key + "_" + sanitizeKey(selectedStore._key);
    const now = Date.now();

    // 기존 레코드 조회 (최초 방문일자 보존 + 이력 누적용)
    const existSnap = await db.ref("visits/" + currentUser.key + "/" + recKey).once("value");
    const existing = existSnap.val() || {};

    const currentData = {
      currentStoreName: document.getElementById("v_storeName").value,
      contact: (document.getElementById("v_contact") || {}).value || "",
      amount: document.getElementById("v_amount").value,
      price: document.getElementById("v_price").value,
      freq: document.getElementById("v_freq").value,
      bins: (document.getElementById("v_bins") || {}).value || "",
      vinyl: document.getElementById("v_vinyl").value,
      truck: (document.getElementById("v_truck") || {}).value || "",
      note: document.getElementById("v_note").value,
      outcome: (document.getElementById("v_outcome") || {}).value || "",
      updatedAt: now
    };

    // 기존 이력 배열 유지 + 이번 업데이트 추가
    const history = Array.isArray(existing.history) ? existing.history.slice() : [];

    // 기존 레코드가 구버전(평탄 구조)이면 마이그레이션
    if (existing.updatedAt && !existing.firstVisitAt && !existing.current){
      history.push({
        currentStoreName: existing.currentStoreName || selectedStore.name || "",
        contact: existing.contact || "",
        amount: existing.amount || "",
        price: existing.price || "",
        freq: existing.freq || "",
        bins: existing.bins || "",
        vinyl: existing.vinyl || "",
        truck: existing.truck || "",
        note: existing.note || "",
        outcome: existing.outcome || "",
        updatedAt: existing.updatedAt
      });
    }

    // 이번 저장을 이력에 추가
    history.push(currentData);

    const payload = {
      storeKey: selectedStore._key,
      storeName: selectedStore.name || "",
      partnerName: currentUser.name,
      partnerKey: currentUser.key,
      firstVisitAt: existing.firstVisitAt || existing.updatedAt || now,
      lastUpdatedAt: now,
      current: currentData,
      history: history,
      // 하위호환: 기존 방식의 필드들도 유지
      currentStoreName: currentData.currentStoreName,
      contact: currentData.contact,
      amount: currentData.amount,
      price: currentData.price,
      freq: currentData.freq,
      bins: currentData.bins,
      vinyl: currentData.vinyl,
      truck: currentData.truck,
      note: currentData.note,
      outcome: currentData.outcome,
      updatedAt: now
    };

    await db.ref("visits/" + currentUser.key + "/" + recKey).set(payload);

    // 내 방문기록 키/캐시 갱신 → 해당 마커 상태 색상 즉시 반영
    // 모든 영업정보 필드를 캐시에 담아야 getVisitStatus 판정이 정확함
    const sk = sanitizeKey(selectedStore._key);
    myVisitedStoreKeys[sk] = true;
    myVisitedStoreData[sk] = {
      contact: currentData.contact || "",
      note: currentData.note || "",
      outcome: currentData.outcome || "",
      amount: currentData.amount || "",
      price: currentData.price || "",
      freq: currentData.freq || "",
      bins: currentData.bins || "",
      vinyl: currentData.vinyl || "",
      truck: currentData.truck || ""
    };
    renderMarkers();

    // 최초/마지막 방문일자 즉시 갱신
    updateVisitTitleDates(payload.firstVisitAt, payload.lastUpdatedAt);

    msg.innerHTML = '<span style="color:#363859;font-weight:600;">✅ 저장 완료</span>';
    showToast("✅ 저장 완료", "success");
  } catch(e){
    msg.innerHTML = '<span style="color:#c62828;">❌ 저장 실패: ' + e.message + '</span>';
    showToast("❌ 저장 실패: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "💾 저장";
  }
}

// 화면 중앙에 토스트 메시지 표시 (1.8초 후 자동 사라짐)
function showToast(msg, type){
  const toast = document.getElementById("saveToast");
  if (!toast) return;
  toast.className = "";
  toast.classList.add(type || "success");
  toast.textContent = msg;
  void toast.offsetWidth;
  toast.classList.add("show");
  setTimeout(function(){ toast.classList.remove("show"); }, 1800);
}

// 방문일자 제목 갱신 공통 함수
function updateVisitTitleDates(firstMs, lastMs){
  const titleEl = document.getElementById("visitFormTitle");
  if (!titleEl) return;
  const firstStr = firstMs ? formatDateYmd(firstMs) : "-";
  const lastStr = lastMs ? formatDateYmd(lastMs) : "-";
  const isSame = firstMs && lastMs && firstStr === lastStr;
  const dateInfo = isSame
    ? '최초 방문: ' + firstStr
    : '최초 방문: ' + firstStr + ' | 마지막 수정: ' + lastStr;
  // 날짜 정보는 .visit-date-info 클래스로 줄바꿈되어 아래 행에 표시됨
  titleEl.innerHTML = '📋 내 방문기록 (' + currentUser.name + ')<span class="visit-date-info">' + dateInfo + '</span>';
}

(async function start(){
  const ok = await verifySession();
  if (ok) showApp();
})();
