<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<style>
  :root {
    --brand-primary: #363859;
    --brand-accent: #F2AC57;
    --brand-primary-dark: #262840;
    --brand-accent-dark: #e09a46;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; overflow:hidden; }

  #loginScreen { position:fixed; inset:0; background:linear-gradient(135deg, #363859 0%, #262840 100%); display:flex; align-items:center; justify-content:center; z-index:9999; }
  #loginBox { background:#fff; border-radius:16px; padding:32px 24px; width:88%; max-width:360px; box-shadow:0 10px 40px rgba(0,0,0,.2); }
  #loginBox h1 { font-size:22px; color:#363859; margin-bottom:6px; text-align:center; font-weight:700; }
  #loginBox p.sub { font-size:13px; color:#666; text-align:center; margin-bottom:24px; }
  #loginBox input { width:100%; padding:14px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:15px; margin-bottom:12px; outline:none; transition:border-color .2s; font-family: inherit; }
  #loginBox input:focus { border-color:#F2AC57; }
  #loginBox button { width:100%; padding:14px; background:#363859; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; font-family: inherit; }
  #loginBox button:active { background:#262840; }
  #loginBox button:disabled { background:#999; }
  #loginError { color:#e53935; font-size:13px; text-align:center; margin-top:10px; min-height:18px; }

  #app { display:none; width:100%; height:100%; position:relative; }
  #header { position:absolute; top:0; left:0; right:0; height:56px; background:#fff; border-bottom:1px solid #e0e0e0; display:flex; align-items:center; padding:0 16px; z-index:100; box-shadow:0 2px 4px rgba(0,0,0,.05); }
  #header .title { font-size:16px; font-weight:700; color:#363859; flex:1; }
  #header .user { font-size:13px; color:#666; margin-right:10px; }
  #header .logout { font-size:12px; color:#999; background:none; border:1px solid #ddd; padding:6px 10px; border-radius:6px; cursor:pointer; font-family: inherit; }

  #searchInput { position:absolute; top:64px; left:10px; right:10px; width:auto; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.08); outline:none; z-index:50; font-family: inherit; }
  #searchInput:focus { border-color:#F2AC57; }

  /* 검색 결과 드롭다운 */
  #searchResults { position:absolute; top:100px; left:10px; right:10px; background:#fff; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:60; max-height:320px; overflow-y:auto; display:none; }
  #searchResults.show { display:block; }
  .searchItem { padding:12px 14px; border-bottom:1px solid #f0f0f0; cursor:pointer; font-size:13px; }
  .searchItem:last-child { border-bottom:none; }
  .searchItem:hover, .searchItem:active { background:#faf6ef; }
  .searchItem .s-name { font-weight:600; color:#363859; margin-bottom:2px; }
  .searchItem .s-addr { font-size:11px; color:#888; }
  .searchItem .s-grade { display:inline-block; font-size:10px; padding:2px 6px; border-radius:3px; margin-left:4px; vertical-align:middle; font-weight:600; }
  .searchItem .s-grade.g-contract { background:#F2AC57; color:#fff; }
  .searchItem .s-grade.g-A { background:#E53935; color:#fff; }
  .searchItem .s-grade.g-B { background:#FB8C00; color:#fff; }
  .searchItem .s-grade.g-C { background:#43A047; color:#fff; }
  .searchItem .s-grade.g-none { background:#9E9E9E; color:#fff; }
  .searchItem .s-visited { display:inline-block; background:#4d4678; color:#fff; font-size:10px; padding:2px 6px; border-radius:3px; margin-left:4px; vertical-align:middle; }
  #searchLoading { padding:14px; text-align:center; color:#999; font-size:13px; }
  #searchEmpty { padding:14px; text-align:center; color:#999; font-size:13px; }

  #filterBar { position:absolute; top:108px; left:10px; right:10px; z-index:50; display:flex; gap:6px; overflow-x:auto; padding:4px 0; -webkit-overflow-scrolling:touch; }
  #filterBar::-webkit-scrollbar { display:none; }
  .filterChip { flex-shrink:0; padding:6px 12px; background:#fff; border:1px solid #ddd; border-radius:16px; font-size:12px; cursor:pointer; white-space:nowrap; box-shadow:0 1px 3px rgba(0,0,0,.08); font-family: inherit; font-weight:500; }
  .filterChip.active { background:#363859; color:#fff; border-color:#363859; }
  .filterChip[data-grade="VISITED"].active { background:#4d4678; border-color:#4d4678; }

  #map { width:100%; height:100%; }

  #myLocBtn { position:absolute; right:14px; bottom:120px; width:44px; height:44px; background:#fff; border:none; border-radius:50%; box-shadow:0 2px 8px rgba(0,0,0,.2); font-size:20px; cursor:pointer; z-index:50; }

  #statusBar { position:absolute; bottom:0; left:0; right:0; background:rgba(54,56,89,.95); color:#fff; padding:8px 14px; font-size:12px; text-align:center; z-index:50; }

  #storePanel { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top-left-radius:20px; border-top-right-radius:20px; box-shadow:0 -4px 20px rgba(0,0,0,.15); z-index:200; transform:translateY(100%); transition:transform .3s; max-height:85vh; overflow-y:auto; }
  #storePanel.open { transform:translateY(0); }
  #panelHandle { width:40px; height:4px; background:#ccc; border-radius:2px; margin:10px auto 4px; }
  #panelClose { position:absolute; top:10px; right:14px; background:none; border:none; font-size:24px; color:#999; cursor:pointer; }
  #panelContent { padding:14px 20px 30px; }
  #panelContent h2 { font-size:18px; margin-bottom:4px; padding-right:30px; color:#363859; font-weight:700; }
  #panelContent .addr { font-size:13px; color:#666; margin-bottom:12px; }
  .badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-right:4px; margin-bottom:4px; }
  .badge.reg { background:#eef0f8; color:#363859; }
  .badge.grade-A { background:#ffebee; color:#c62828; }
  .badge.grade-B { background:#fff3e0; color:#e65100; }
  .badge.grade-C { background:#e8f5e9; color:#2e7d32; }
  .badge.grade-contract { background:#F2AC57; color:#fff; }
  .badge.grade-none { background:#f5f5f5; color:#757575; }
  .status-ok { color:#2e7d32; font-weight:600; }
  .status-ng { color:#c62828; font-weight:600; }
  .memo { background:#faf6ef; padding:10px 12px; border-radius:8px; font-size:13px; color:#555; margin:10px 0; white-space:pre-wrap; border-left:3px solid #F2AC57; }

  #visitForm { margin-top:16px; padding-top:16px; border-top:2px solid #f0f0f0; }
  #visitForm h3 { font-size:14px; color:#363859; margin-bottom:10px; font-weight:600; }
  .form-row { margin-bottom:10px; }
  .form-row label { display:block; font-size:12px; color:#666; margin-bottom:4px; font-weight:500; }
  .form-row input, .form-row select, .form-row textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:13px; outline:none; font-family: inherit; }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color:#F2AC57; }
  .form-row textarea { resize:vertical; min-height:60px; }
  #saveBtn { width:100%; padding:13px; background:#F2AC57; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; font-family: inherit; }
  #saveBtn:active { background:#e09a46; }
  #saveBtn:disabled { background:#aaa; }
  #saveMsg { text-align:center; font-size:13px; margin-top:8px; min-height:18px; }

  /* 저장 토스트 (화면 중앙 고정, 스크롤 영향 없음) */
  #saveToast { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(54,56,89,0.95); color:#fff; padding:16px 28px; border-radius:12px; font-size:15px; font-weight:600; z-index:10000; opacity:0; pointer-events:none; transition:opacity .25s; box-shadow:0 4px 20px rgba(0,0,0,.3); font-family: inherit; }
  #saveToast.show { opacity:1; }
  #saveToast.success { background:rgba(54,56,89,0.95); }
  #saveToast.error { background:rgba(198,40,40,0.95); }
</style>
</head>
<body>

<div id="loginScreen">
  <div id="loginBox">
    <h1>업박스 영업 지도</h1>
    <p class="sub">파트너 전용 CRM 시스템</p>
    <input id="partnerName" type="text" placeholder="파트너명" autocomplete="off">
    <input id="partnerCode" type="password" placeholder="파트너사 코드" autocomplete="off">
    <button id="loginBtn" onclick="doLogin()">로그인</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="title">업박스 영업 지도</div>
    <div class="user" id="userName"></div>
    <button class="logout" onclick="doLogout()">로그아웃</button>
  </div>

  <input id="searchInput" type="text" placeholder="🔍 전국 업장명 검색" oninput="onSearch()" onfocus="onSearchFocus()" autocomplete="off">
  <div id="searchResults"></div>

<div id="filterBar">
    <div class="filterChip active" data-grade="ALL" onclick="setFilter('ALL')">전체</div>
    <div class="filterChip" data-grade="VISITED" onclick="setFilter('VISITED')">✓ 방문완료</div>
    <div class="filterChip" data-grade="A" onclick="setFilter('A')">A등급</div>
    <div class="filterChip" data-grade="B" onclick="setFilter('B')">B등급</div>
    <div class="filterChip" data-grade="C" onclick="setFilter('C')">C등급</div>
    <div class="filterChip" data-grade="미지정" onclick="setFilter('미지정')">등급미정</div>
    <div class="filterChip" data-grade="기계약" onclick="setFilter('기계약')">기계약</div>
  </div>

  <div id="map"></div>

  <button id="myLocBtn" onclick="moveToMyLocation()" title="현재 위치">📍</button>

  <div id="statusBar">로딩 중...</div>
</div>

<div id="storePanel">
  <div id="panelHandle"></div>
  <button id="panelClose" onclick="closePanel()">×</button>
  <div id="panelContent"></div>
</div>

<!-- 저장 완료/실패 토스트 (화면 중앙 고정) -->
<div id="saveToast"></div>

<script>
/* ==================== Firebase 초기화 ==================== */
const firebaseConfig = {
  apiKey: "AIzaSyA1TKLHcnnXgwQVNId4pkLSi0QrE-KW7RU",
  authDomain: "localsales-map.firebaseapp.com",
  databaseURL: "https://localsales-map-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "localsales-map",
  storageBucket: "localsales-map.firebasestorage.app",
  messagingSenderId: "1077741182559",
  appId: "1:1077741182559:web:c07eb3d853676fe59c45ea"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ==================== 전역 상태 ==================== */
let currentUser = null;
let map = null;
let markers = [];
let allStoresInView = [];
let currentFilter = 'ALL';
let currentKeyword = '';
let selectedStore = null;
let userLocationMarker = null;
let myVisitedStoreKeys = {};  // 내가 방문기록을 남긴 업장 키 { storeKey: true }

/* ==================== 유틸 ==================== */
function sanitizeKey(s){ return String(s||"").replace(/[.#$\[\]\/]/g,"_"); }

// 실제 Firebase에 저장된 등급 값을 표준 값으로 정규화
function normalizeGrade(raw){
  const g = String(raw||"").trim();
  if (g === "업박스기계약업장" || g === "기계약" || g === "기계약업장") return "기계약";
  if (g === "A" || g === "A등급") return "A";
  if (g === "B" || g === "B등급") return "B";
  if (g === "C" || g === "C등급") return "C";
  return "미지정";
}

function gradeInfo(raw){
  const g = normalizeGrade(raw);
  if (g === "기계약") return { label:"★ 기계약", color:"#F2AC57", text:"#fff", icon:"★" };
  if (g === "A")     return { label:"A등급",     color:"#E53935", text:"#fff", icon:"A" };
  if (g === "B")     return { label:"B등급",     color:"#FB8C00", text:"#fff", icon:"B" };
  if (g === "C")     return { label:"C등급",     color:"#43A047", text:"#fff", icon:"C" };
  return               { label:"미지정",         color:"#9E9E9E", text:"#fff", icon:"?" };
}

function makeMarkerImage(grade, visited){
  // 방문기록 있으면 #4d4678 마커로 표시 (등급 색상 오버라이드, 아이콘은 등급 유지)
  const g = gradeInfo(grade);
  const color = visited ? "#4d4678" : g.color;
  const text = visited ? "#fff" : g.text;
  const icon = g.icon;  // 아이콘은 항상 등급 아이콘 유지
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46">'
    + '<path d="M18 0 C8 0 0 8 0 18 C0 30 18 46 18 46 C18 46 36 30 36 18 C36 8 28 0 18 0 Z" fill="' + color + '" stroke="#fff" stroke-width="2"/>'
    + '<text x="18" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="' + text + '" font-family="Arial">' + icon + '</text>'
    + '</svg>';
  const url = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
  return new kakao.maps.MarkerImage(url, new kakao.maps.Size(36,46), { offset:new kakao.maps.Point(18,46) });
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

/* ==================== 로그인 ==================== */
async function doLogin(){
  const name = document.getElementById("partnerName").value.trim();
  const code = document.getElementById("partnerCode").value.trim();
  const errEl = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");

  if (!name || !code){ errEl.textContent="파트너명과 코드를 모두 입력하세요."; return; }

  btn.disabled = true;
  btn.textContent = "확인 중...";
  errEl.textContent = "";

  try {
    const key = sanitizeKey(code);
    const snap = await db.ref("partners/" + key).once("value");
    const data = snap.val();

    if (!data){ errEl.textContent="등록되지 않은 파트너 코드입니다."; btn.disabled=false; btn.textContent="로그인"; return; }
    if (String(data.name).trim() !== name){ errEl.textContent="파트너명이 일치하지 않습니다."; btn.disabled=false; btn.textContent="로그인"; return; }

    currentUser = { name: name, code: code, key: key };
    localStorage.setItem("upbox_user", JSON.stringify(currentUser));
    showApp();
  } catch(e){
    errEl.textContent = "서버 오류: " + e.message;
    btn.disabled = false;
    btn.textContent = "로그인";
  }
}

async function verifySession(){
  const saved = localStorage.getItem("upbox_user");
  if (!saved) return false;
  try {
    const u = JSON.parse(saved);
    const snap = await db.ref("partners/" + u.key).once("value");
    const data = snap.val();
    if (!data || String(data.name).trim() !== u.name){
      localStorage.removeItem("upbox_user");
      return false;
    }
    currentUser = u;
    return true;
  } catch(e){ return false; }
}

function doLogout(){
  localStorage.removeItem("upbox_user");
  location.reload();
}

function showApp(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userName").textContent = currentUser.name + " 님";
  loadMyVisitedKeys();
  initMap();
}

// 현재 로그인한 파트너가 저장한 방문기록 키 목록 로드
async function loadMyVisitedKeys(){
  try {
    const snap = await db.ref("visits/" + currentUser.key).once("value");
    const data = snap.val() || {};
    myVisitedStoreKeys = {};
    for (const recKey in data){
      const r = data[recKey];
      if (r && r.storeKey){
        myVisitedStoreKeys[sanitizeKey(r.storeKey)] = true;
      }
    }
  } catch(e){ console.error("방문기록 키 로드 실패:", e); }
}

/* ==================== 지도 ==================== */
function initMap(){
  const container = document.getElementById("map");
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5
  });

  let moveTimer = null;
  kakao.maps.event.addListener(map, 'idle', function(){
    clearTimeout(moveTimer);
    moveTimer = setTimeout(loadStoresInView, 400);
  });

  // 지도의 빈 영역 클릭 시 상세 패널 닫기
  kakao.maps.event.addListener(map, 'click', function(){
    closePanel();
  });

  moveToMyLocation();
}

function moveToMyLocation(){
  if (!navigator.geolocation){
    setStatus("⚠️ 이 브라우저는 위치 서비스를 지원하지 않습니다.");
    return;
  }
  setStatus("📍 현재 위치 확인 중...");
  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const loc = new kakao.maps.LatLng(lat, lng);
      map.setCenter(loc);
      map.setLevel(4);

      if (userLocationMarker) userLocationMarker.setMap(null);
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="#4285F4" stroke="#fff" stroke-width="3"/></svg>';
      userLocationMarker = new kakao.maps.Marker({
        position: loc,
        map: map,
        image: new kakao.maps.MarkerImage(
          "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          new kakao.maps.Size(20,20),
          { offset: new kakao.maps.Point(10,10) }
        ),
        zIndex: 999
      });
    },
    function(err){ setStatus("⚠️ 위치 권한이 필요합니다."); },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

/* ==================== 업장 로딩 ==================== */
async function loadStoresInView(){
  if (!map) return;
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();

  const centerLat = (sw.getLat()+ne.getLat())/2;
  const diagKm = haversine(sw.getLat(), sw.getLng(), ne.getLat(), ne.getLng());

  let minLat, maxLat;
  if (diagKm > 30){
    minLat = centerLat - 0.09;
    maxLat = centerLat + 0.09;
  } else {
    minLat = sw.getLat() - 0.01;
    maxLat = ne.getLat() + 0.01;
  }

  setStatus("📍 주변 업장 로딩 중...");

  try {
    const snap = await db.ref("stores")
      .orderByChild("lat")
      .startAt(minLat)
      .endAt(maxLat)
      .once("value");

    const data = snap.val() || {};
    const minLng = sw.getLng() - 0.01, maxLng = ne.getLng() + 0.01;

    const list = [];
    for (const key in data){
      const s = data[key];
      if (!s.lat || !s.lng) continue;
      if (s.lng < minLng || s.lng > maxLng) continue;
      s._key = key;
      list.push(s);
    }

    allStoresInView = list;
    renderMarkers();
    setStatus("✅ " + list.length + "개 업장 표시됨");
  } catch(e){
    setStatus("⚠️ 로딩 실패: " + e.message);
  }
}

function renderMarkers(){
  markers.forEach(function(m){ m.marker.setMap(null); });
  markers = [];

  allStoresInView.forEach(function(s){
    if (currentFilter === 'VISITED'){
      // 방문완료 필터: 내가 방문기록 남긴 업장만
      if (!myVisitedStoreKeys[sanitizeKey(s._key)]) return;
    } else if (currentFilter !== 'ALL'){
      const normalized = normalizeGrade(s.grade);
      if (normalized !== currentFilter) return;
    }

    const visited = !!myVisitedStoreKeys[sanitizeKey(s._key)];
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(s.lat, s.lng),
      image: makeMarkerImage(s.grade, visited),
      map: map
    });

    kakao.maps.event.addListener(marker, 'click', function(){ openPanel(s); });
    markers.push({ marker: marker, store: s });
  });
}

function setFilter(grade){
  currentFilter = grade;
  document.querySelectorAll('.filterChip').forEach(function(el){
    el.classList.toggle('active', el.dataset.grade === grade);
  });
  renderMarkers();
}

/* ==================== 전역 업장 검색 ==================== */
let searchTimer = null;
let lastSearchKeyword = "";

function onSearchFocus(){
  // 포커스 시 기존 결과가 있으면 다시 보여주기
  const kw = document.getElementById("searchInput").value.trim();
  if (kw.length >= 1) onSearch();
}

function onSearch(){
  const kw = document.getElementById("searchInput").value.trim();
  const resultsEl = document.getElementById("searchResults");

  // 빈 입력이면 드롭다운 숨김
  if (!kw){
    resultsEl.classList.remove("show");
    resultsEl.innerHTML = "";
    return;
  }

  // 디바운싱 (300ms 타이핑 멈춘 후 검색)
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ doGlobalSearch(kw); }, 300);
}

async function doGlobalSearch(keyword){
  if (keyword === lastSearchKeyword) return;
  lastSearchKeyword = keyword;

  const resultsEl = document.getElementById("searchResults");
  resultsEl.classList.add("show");
  resultsEl.innerHTML = '<div id="searchLoading">🔍 검색 중...</div>';

  try {
    // Firebase name 인덱스 활용 - 시작 문자열 기반 prefix 검색
    // name >= keyword AND name < keyword + "\uf8ff" (유니코드 최대값)
    const snap = await db.ref("stores")
      .orderByChild("name")
      .startAt(keyword)
      .endAt(keyword + "\uf8ff")
      .limitToFirst(30)
      .once("value");

    const data = snap.val() || {};
    const list = [];
    for (const key in data){
      const s = data[key];
      if (!s.lat || !s.lng) continue;
      s._key = key;
      list.push(s);
    }

    // 이름 기준 정렬
    list.sort(function(a, b){ return String(a.name||"").localeCompare(String(b.name||"")); });

    renderSearchResults(list, keyword);
  } catch(e){
    resultsEl.innerHTML = '<div id="searchEmpty">⚠️ 검색 실패: ' + e.message + '</div>';
  }
}

function renderSearchResults(list, keyword){
  const resultsEl = document.getElementById("searchResults");

  if (list.length === 0){
    resultsEl.innerHTML = '<div id="searchEmpty">"' + keyword + '"로 시작하는 업장을 찾을 수 없어요<br><span style="font-size:11px;color:#bbb;">(업장명 앞부분으로 검색해보세요)</span></div>';
    return;
  }

  const html = list.map(function(s){
    const normalizedGrade = normalizeGrade(s.grade);
    const gradeLabel = normalizedGrade === "기계약" ? "★" : normalizedGrade;
    const gradeClass = normalizedGrade === "기계약" ? "g-contract"
                     : normalizedGrade === "A" ? "g-A"
                     : normalizedGrade === "B" ? "g-B"
                     : normalizedGrade === "C" ? "g-C" : "g-none";
    const visited = myVisitedStoreKeys[sanitizeKey(s._key)] ? '<span class="s-visited">✓ 방문</span>' : "";
    const safeKey = s._key.replace(/"/g, '&quot;');
    return '<div class="searchItem" onclick="selectSearchResult(\'' + encodeURIComponent(safeKey) + '\')">'
      + '<div class="s-name">' + (s.name || "(이름없음)") + '<span class="s-grade ' + gradeClass + '">' + gradeLabel + '</span>' + visited + '</div>'
      + '<div class="s-addr">' + (s.address || "") + '</div>'
      + '</div>';
  }).join('');

  resultsEl.innerHTML = html;

  // 캐시에 저장 (클릭 시 사용)
  window.__searchCache = {};
  list.forEach(function(s){
    window.__searchCache[s._key] = s;
  });
}

async function selectSearchResult(encodedKey){
  const key = decodeURIComponent(encodedKey);
  const store = window.__searchCache && window.__searchCache[key];
  if (!store) return;

  // 검색창/드롭다운 닫기
  document.getElementById("searchResults").classList.remove("show");
  document.getElementById("searchInput").value = store.name || "";
  document.getElementById("searchInput").blur();

  // 지도 이동
  const loc = new kakao.maps.LatLng(store.lat, store.lng);
  map.setLevel(3);   // 가까이 줌
  map.setCenter(loc);

  // 약간의 딜레이 후 패널 오픈 (지도 이동 + 주변 업장 로딩 이후)
  setTimeout(function(){ openPanel(store); }, 500);
}

// 검색창 외부 클릭 시 드롭다운 닫기
document.addEventListener("click", function(e){
  const input = document.getElementById("searchInput");
  const results = document.getElementById("searchResults");
  if (!input || !results) return;
  if (!input.contains(e.target) && !results.contains(e.target)){
    results.classList.remove("show");
  }
});

function setStatus(msg){
  document.getElementById("statusBar").textContent = msg;
}

/* ==================== 업장 상세 패널 ==================== */
async function openPanel(store){
  selectedStore = store;
  const panel = document.getElementById("storePanel");
  const content = document.getElementById("panelContent");

  const g = gradeInfo(store.grade);
  const normalizedGrade = normalizeGrade(store.grade);
  const isContract = (normalizedGrade === "기계약");

  const regBadge = store.adminType ? '<span class="badge reg">' + store.adminType + '</span>' : "";
  const gradeBadgeClass = normalizedGrade === "기계약" ? "grade-contract"
                        : normalizedGrade === "A" ? "grade-A"
                        : normalizedGrade === "B" ? "grade-B"
                        : normalizedGrade === "C" ? "grade-C" : "grade-none";
  const gradeBadge = '<span class="badge ' + gradeBadgeClass + '">' + g.label + '</span>';

  // 기계약은 운영가능여부 숨김
  let statusBadge = "";
  if (!isContract){
    const isOperable = store.operable === "Y" || store.operable === "가능" || store.operable === true || store.operable === "운영가능";
    statusBadge = isOperable
      ? '<span class="status-ok">🟢 운영가능</span>'
      : '<span class="status-ng">🔴 운영불가</span>';
  }

  const memoHtml = store.memo ? '<div class="memo">📝 ' + store.memo + '</div>' : "";

  // 추가 정보 (업종/면적/전화번호/예상배출량)
  const infoRows = [];
  if (store.bizType) infoRows.push({k:"업종", v:store.bizType});
  if (store.area) infoRows.push({k:"면적", v:store.area});
  if (store.phone) infoRows.push({k:"전화번호", v:store.phone});
  if (store.volume) infoRows.push({k:"예상배출량", v:store.volume});
  const infoHtml = infoRows.length > 0
    ? '<div style="margin:10px 0;">' + infoRows.map(function(r){
        return '<div style="display:flex;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">'
          + '<span style="width:80px;color:#999;">' + r.k + '</span>'
          + '<span style="flex:1;color:#333;">' + r.v + '</span></div>';
      }).join('') + '</div>'
    : "";

  // 기계약이 아닐 때만 방문기록 입력폼 표시
  const visitFormHtml = isContract ? '' : (
    '<div id="visitForm">' +
    '<h3 id="visitFormTitle">📋 내 방문기록 (' + currentUser.name + ')</h3>' +
    '<div class="form-row"><label>현재 업체명</label><input id="v_storeName" type="text" value="' + (store.name||"") + '" placeholder="업체명"></div>' +
    '<div class="form-row"><label>월 예상배출량 (L)</label><input id="v_amount" type="number" placeholder="예: 500"></div>' +
    '<div class="form-row"><label>현재 단가 (원/L)</label><input id="v_price" type="number" placeholder="예: 150"></div>' +
    '<div class="form-row"><label>현재 주 수거횟수</label><input id="v_freq" type="number" placeholder="예: 3"></div>' +
    '<div class="form-row"><label>비닐 사용여부</label><select id="v_vinyl"><option value="">선택</option><option value="사용">사용</option><option value="미사용">미사용</option></select></div>' +
    '<div class="form-row"><label>기타 특이사항</label><textarea id="v_note" placeholder="현장 방문 메모"></textarea></div>' +
    '<button id="saveBtn" onclick="saveVisit()">💾 저장</button>' +
    '<div id="saveMsg"></div>' +
    '</div>'
  );

  // 기계약 안내 문구 (방문기록 입력폼 대체)
  const contractNoticeHtml = isContract
    ? '<div style="margin-top:16px;padding:14px;background:#F2AC57;border-radius:8px;font-size:13px;color:#fff;text-align:center;font-weight:600;">★ 업박스 기계약 업장입니다</div>'
    : '';

  content.innerHTML =
    '<h2>' + (store.name || "(이름없음)") + '</h2>' +
    '<div class="addr">' + (store.address || "") + '</div>' +
    '<div style="margin-bottom:10px;">' + regBadge + gradeBadge + ' ' + statusBadge + '</div>' +
    infoHtml +
    memoHtml +
    contractNoticeHtml +
    visitFormHtml;

  panel.classList.add("open");
  if (!isContract) await loadMyVisit(store._key);
}

function closePanel(){
  document.getElementById("storePanel").classList.remove("open");
  selectedStore = null;
}

async function loadMyVisit(storeKey){
  try {
    const recKey = "REC_" + currentUser.key + "_" + sanitizeKey(storeKey);
    const snap = await db.ref("visits/" + currentUser.key + "/" + recKey).once("value");
    const v = snap.val();
    if (!v) return;

    // 새 구조(current)가 있으면 그것을 우선, 없으면 구버전 평탄 구조 사용
    const data = v.current || v;

    if (data.currentStoreName !== undefined) document.getElementById("v_storeName").value = data.currentStoreName;
    if (data.amount !== undefined) document.getElementById("v_amount").value = data.amount;
    if (data.price !== undefined) document.getElementById("v_price").value = data.price;
    if (data.freq !== undefined) document.getElementById("v_freq").value = data.freq;
    if (data.vinyl !== undefined) document.getElementById("v_vinyl").value = data.vinyl;
    if (data.note !== undefined) document.getElementById("v_note").value = data.note;

    // 최초/마지막 방문일자 표시
    const firstMs = v.firstVisitAt || v.updatedAt;
    const lastMs = v.lastUpdatedAt || v.updatedAt;
    if (firstMs) updateVisitTitleDates(firstMs, lastMs);
  } catch(e){ console.error(e); }
}

async function saveVisit(){
  if (!selectedStore) return;
  const btn = document.getElementById("saveBtn");
  const msg = document.getElementById("saveMsg");
  btn.disabled = true;
  btn.textContent = "저장 중...";
  msg.textContent = "";

  try {
    const recKey = "REC_" + currentUser.key + "_" + sanitizeKey(selectedStore._key);
    const now = Date.now();

    // 기존 레코드 조회 (최초 방문일자 보존 + 이력 누적용)
    const existSnap = await db.ref("visits/" + currentUser.key + "/" + recKey).once("value");
    const existing = existSnap.val() || {};

    const currentData = {
      currentStoreName: document.getElementById("v_storeName").value,
      amount: document.getElementById("v_amount").value,
      price: document.getElementById("v_price").value,
      freq: document.getElementById("v_freq").value,
      vinyl: document.getElementById("v_vinyl").value,
      note: document.getElementById("v_note").value,
      updatedAt: now
    };

    // 기존 이력 배열 유지 + 이번 업데이트 추가
    const history = Array.isArray(existing.history) ? existing.history.slice() : [];

    // 기존 레코드가 구버전(평탄 구조)이면 마이그레이션
    if (existing.updatedAt && !existing.firstVisitAt && !existing.current){
      history.push({
        currentStoreName: existing.currentStoreName || selectedStore.name || "",
        amount: existing.amount || "",
        price: existing.price || "",
        freq: existing.freq || "",
        vinyl: existing.vinyl || "",
        note: existing.note || "",
        updatedAt: existing.updatedAt
      });
    }

    // 이번 저장을 이력에 추가
    history.push(currentData);

    const payload = {
      storeKey: selectedStore._key,
      storeName: selectedStore.name || "",
      partnerName: currentUser.name,
      partnerKey: currentUser.key,
      firstVisitAt: existing.firstVisitAt || existing.updatedAt || now,
      lastUpdatedAt: now,
      current: currentData,
      history: history,
      // 하위호환: 기존 방식의 필드들도 유지
      currentStoreName: currentData.currentStoreName,
      amount: currentData.amount,
      price: currentData.price,
      freq: currentData.freq,
      vinyl: currentData.vinyl,
      note: currentData.note,
      updatedAt: now
    };

    await db.ref("visits/" + currentUser.key + "/" + recKey).set(payload);

    // 내 방문기록 키 목록 업데이트 → 해당 마커 즉시 방문 색상으로 변경
    myVisitedStoreKeys[sanitizeKey(selectedStore._key)] = true;
    renderMarkers();

    // 최초/마지막 방문일자 즉시 갱신
    updateVisitTitleDates(payload.firstVisitAt, payload.lastUpdatedAt);

    msg.innerHTML = '<span style="color:#363859;font-weight:600;">✅ 저장 완료</span>';
    showToast("✅ 저장 완료", "success");
  } catch(e){
    msg.innerHTML = '<span style="color:#c62828;">❌ 저장 실패: ' + e.message + '</span>';
    showToast("❌ 저장 실패: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "💾 저장";
  }
}

// 화면 중앙에 토스트 메시지 표시 (1.8초 후 자동 사라짐)
function showToast(msg, type){
  const toast = document.getElementById("saveToast");
  if (!toast) return;
  toast.className = "";
  toast.classList.add(type || "success");
  toast.textContent = msg;
  // 강제 reflow 후 show 클래스 추가 (애니메이션 트리거)
  void toast.offsetWidth;
  toast.classList.add("show");
  setTimeout(function(){ toast.classList.remove("show"); }, 1800);
}

// 방문일자 제목 갱신 공통 함수
function updateVisitTitleDates(firstMs, lastMs){
  const titleEl = document.getElementById("visitFormTitle");
  if (!titleEl) return;
  const fmt = function(ms){
    const d = new Date(ms);
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  };
  const firstStr = firstMs ? fmt(firstMs) : "-";
  const lastStr = lastMs ? fmt(lastMs) : "-";
  const isSame = firstMs && lastMs && firstStr === lastStr;
  const dateInfo = isSame
    ? '최초 방문: ' + firstStr
    : '최초 방문: ' + firstStr + ' | 마지막 수정: ' + lastStr;
  titleEl.innerHTML = '📋 내 방문기록 (' + currentUser.name + ') <span style="color:#999;font-weight:400;font-size:12px;">| ' + dateInfo + '</span>';
}

/* ==================== 초기 실행 ==================== */
(async function start(){
  const ok = await verifySession();
  if (ok) showApp();
})();
</script>
