<!-- ============================================================
     ② 패널 터치 핸들러 (initPanelTouchHandlers 함수 통째로 교체)
     ============================================================ -->
<script>
/**
 * 패널 터치 핸들러 (v45.4)
 * - 위에서 아래로 끌 때만 닫힘 (맨 끝 당기기 닫기 제거)
 * - 저장 버튼이 패널 하단에 있어서, 저장 버튼 누르려고 당기다가 
 *   닫히는 문제 해결
 */
let panelTouchStartY = 0;
let panelTouchCurrentY = 0;
let panelIsDraggingDown = false;
let panelDragStartedAtTop = false;

function initPanelTouchHandlers() {
  const panel = document.getElementById('storePanel');
  const panelHeader = document.getElementById('panelHeader');
  const panelContent = document.getElementById('panelContent');

  if (!panel) return;

  // ── 터치 시작 ──
  panel.addEventListener('touchstart', function(e) {
    panelTouchStartY = e.touches[0].clientY;
    panelTouchCurrentY = panelTouchStartY;

    // 드래그 시작 위치 판정:
    // - 패널 헤더(드래그 핸들 + 상단 영역)에서 시작했거나
    // - 컨텐츠가 최상단(스크롤 0)일 때만 닫기 가능
    const target = e.target;
    const isHeader = panelHeader && panelHeader.contains(target);
    const contentScrolledToTop = panelContent ? (panelContent.scrollTop <= 0) : true;

    panelDragStartedAtTop = isHeader || contentScrolledToTop;
    panelIsDraggingDown = false;
  }, { passive: true });

  // ── 터치 이동 ──
  panel.addEventListener('touchmove', function(e) {
    if (!panelDragStartedAtTop) return;

    panelTouchCurrentY = e.touches[0].clientY;
    const diff = panelTouchCurrentY - panelTouchStartY;

    // 80px 이상 끌어내리면 닫기 플래그 ON
    if (diff > 80) {
      panelIsDraggingDown = true;
    } else {
      panelIsDraggingDown = false;
    }
  }, { passive: true });

  // ── 터치 종료 ──
  panel.addEventListener('touchend', function() {
    if (panelIsDraggingDown && panelDragStartedAtTop) {
      closeStorePanel();
    }
    // 리셋
    panelTouchStartY = 0;
    panelTouchCurrentY = 0;
    panelIsDraggingDown = false;
    panelDragStartedAtTop = false;
  }, { passive: true });

  // ❌ 제거: 맨 끝에서 더 당기기 닫기 로직
  //    v45.3에서 panelContent의 scroll 또는 touchmove에서
  //    (scrollTop + clientHeight >= scrollHeight) 조건으로 닫던 부분이 있었다면
  //    해당 코드 블록을 모두 삭제하세요.
}
</script>


<!-- ============================================================
     ③ SSO 토큰 생성 (브라우저용, 신규 추가)
     ============================================================ -->
<script>
/**
 * SSO 토큰 생성 (브라우저용)
 * 알고리즘: SHA-256(partner_name | partner_code | yyyymmdd | SSO_SECRET) 앞 16자 hex
 * 영업기준표 Code.gs 의 generateSSOToken() 결과와 100% 동일해야 함
 */
async function generateSSOToken(partnerName, partnerCode) {
  // 한국시간 기준 yyyymmdd
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
  const kst = new Date(utc + 9 * 60 * 60 * 1000);
  const yyyy = kst.getFullYear();
  const mm = String(kst.getMonth() + 1).padStart(2, '0');
  const dd = String(kst.getDate()).padStart(2, '0');
  const today = yyyy + mm + dd;

  const raw = partnerName + '|' + partnerCode + '|' + today + '|' + SSO_SECRET;

  // Web Crypto API로 SHA-256
  const encoder = new TextEncoder();
  const data = encoder.encode(raw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));

  // 앞 8바이트 → 16자리 hex
  return hashArray.slice(0, 8)
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}
</script>


<!-- ============================================================
     ④ 영업기준표 열기 (openPriceGuide 함수 통째로 교체)
     ============================================================ -->
<script>
/**
 * 영업기준표 열기 (v45.4 - SSO 자동 로그인 + 자동 조회)
 *
 * 호출 예:
 *   <button onclick="openPriceGuide(currentStore, '베이직')">📊 영업기준표 확인</button>
 *
 * @param {Object} store - 업장 정보 ({ sido, sigungu, gu, emd, ... })
 * @param {string} service - "베이직" or "플러스"
 */
async function openPriceGuide(store, service) {
  try {
    // 현재 로그인된 파트너 정보 (v45.3 기존 전역 변수)
    const partnerName = currentPartnerName;
    const partnerCode = currentPartnerCode;

    if (!partnerName || !partnerCode) {
      alert('로그인 정보를 확인할 수 없습니다. 다시 로그인해주세요.');
      return;
    }

    // 1) SSO 토큰 생성 (24시간 유효)
    const token = await generateSSOToken(partnerName, partnerCode);

    // 2) URL 파라미터 구성 (SSO + 자동 조회)
    const params = new URLSearchParams({
      // SSO 인증 파라미터
      sso: '1',
      partner_name: partnerName,
      partner_code: partnerCode,
      token: token,
      // 자동 조회 파라미터 (v45.3 기존)
      sido: store.sido || '',
      sidodong: store.sigungu || '',
      gueup: store.gu || '',
      dong: store.emd || '',
      service: service || '베이직'
    });

    const url = PRICE_GUIDE_URL + '?' + params.toString();
    window.open(url, '_blank');
  } catch (err) {
    console.error('영업기준표 이동 실패:', err);
    alert('영업기준표를 여는 중 오류가 발생했습니다.\n' + (err.message || ''));
  }
}
</script>
