<script>
const firebaseConfig = {
  databaseURL: "https://salespartners-map-67daf-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const PRICE_GUIDE_URL = 'https://script.google.com/macros/s/AKfycbx09Kv-N_Jk0fOpnoP2AdCXnYVICdJcYusk0611Y_EZVccTfin_1uk5nXSKBFkZpd9c/exec';
const SSO_SECRET = 'upbox-sso-2026-secret-x7k9m';

const ADMIN_CODES = ['0001', '0002', '0003', '0004', '0005', '0006', '0007'];
const CLUSTER_MIN_LEVEL = 7;
const FILTER_MOVE_MAX_PINS = 500;
const ADMIN_INIT_LEVEL = 11;
const ADMIN_CONTRACT_ZOOM_LEVEL = 5;

function isAdmin(code) {
  return code && ADMIN_CODES.indexOf(String(code).trim()) !== -1;
}

const CACHE = {
  OTHER_VISITS:    { key: 'cache_other_visits_v2',     ttlMs: 24 * 60 * 60 * 1000 },
  MY_PROJECTS:     { key: 'cache_my_projects_v2',      ttlMs: 30 * 24 * 60 * 60 * 1000 },
  ADMIN_AGGREGATE: { key: 'cache_admin_aggregate_v1',  ttlMs: 12 * 60 * 60 * 1000 }
};

function getCache(c) {
  try {
    const raw = localStorage.getItem(c.key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.t || !obj.d) return null;
    if (Date.now() - obj.t > c.ttlMs) { localStorage.removeItem(c.key); return null; }
    return obj.d;
  } catch(e) { return null; }
}

function setCache(c, data) {
  try {
    localStorage.setItem(c.key, JSON.stringify({ t: Date.now(), d: data }));
  } catch(e) {
    try {
      const keys = ['cache_other_visits_v2', 'cache_my_projects_v2', 'cache_admin_aggregate_v1', 'cache_other_visits', 'cache_my_projects'];
      for (const k of keys) {
        if (k !== c.key && localStorage.getItem(k)) { localStorage.removeItem(k); break; }
      }
      localStorage.setItem(c.key, JSON.stringify({ t: Date.now(), d: data }));
    } catch(e2) {}
  }
}

};
const NOTICE_SEEN_PREFIX = 'notice_seen_';

async function checkNotices() {
  try {
    const snap = await db.ref('notices').once('value');
    const notices = snap.val() || {};
    const queue = [];
    for (const type in notices) {
      const notice = notices[type];
      if (!notice || !notice.version) continue;
      if (localStorage.getItem(NOTICE_SEEN_PREFIX + type) !== notice.version) {
        queue.push({ type: type, notice: notice });
      }
    }
    if (queue.length > 0) showNoticesSequentially(queue);
  } catch(e) {}
}

function showNoticesSequentially(queue) {
  if (queue.length === 0) return;
  const item = queue.shift();
  showNoticeModal(item.type, item.notice, function() { showNoticesSequentially(queue); });
}

function showNoticeModal(type, notice, onClose) {
  const meta = NOTICE_TYPES[type] || { icon: '📢', title: '안내', cacheKeysToClear: [] };
  const modal = document.getElementById('noticeModal');
  document.getElementById('noticeIcon').textContent = meta.icon;
  document.getElementById('noticeTitle').textContent = meta.title;
  document.getElementById('noticeMessage').textContent = notice.message;
  modal.classList.add('show');
  document.getElementById('noticeBtnApply').onclick = function() {
    if (meta.cacheKeysToClear) meta.cacheKeysToClear.forEach(k => localStorage.removeItem(k));
    localStorage.setItem(NOTICE_SEEN_PREFIX + type, notice.version);
    modal.classList.remove('show');
    location.reload();
  };
  document.getElementById('noticeBtnLater').onclick = function() {
    modal.classList.remove('show');
    if (onClose) setTimeout(onClose, 200);
  };
}

async function fetchContractsInCurrentBounds() {
  if (!map) return [];
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const latMin = sw.getLat(), latMax = ne.getLat();
  const lngMin = sw.getLng(), lngMax = ne.getLng();

  console.log('[기계약 fetch 시작] level=' + map.getLevel() + ', bounds=', { latMin, latMax, lngMin, lngMax });

  try {
    const snap = await db.ref('stores_light').orderByChild('lat').startAt(latMin).endAt(latMax).once('value');
    const raw = snap.val() || {};
    const allInRange = [];
    const contracts = [];
    const gradeSamples = {};

    for (const k in raw) {
      const s = raw[k];
      if (!s || isNaN(s.lat) || isNaN(s.lng)) continue;
      if (s.lng < lngMin || s.lng > lngMax) continue;
      allInRange.push(s);

      // grade 값 분포 샘플링 (디버깅용)
      const g = s.grade || '(없음)';
      gradeSamples[g] = (gradeSamples[g] || 0) + 1;

      if (!isContractGrade(s.grade)) continue;
      s._key = k;
      s._isContract = true;
      contracts.push(s);
    }

    console.log('[기계약 fetch 결과] bounds 안 총 ' + allInRange.length + '개, 기계약 ' + contracts.length + '개');
    console.log('[grade 분포]', gradeSamples);
    if (contracts.length > 0) {
      console.log('[기계약 샘플 3개]', contracts.slice(0, 3).map(c => ({ name: c.name, grade: c.grade, lat: c.lat, lng: c.lng })));
    }

    return contracts;
  } catch(e) {
    console.error('[기계약 fetch 실패]', e);
    return [];
  }
}

async function checkMyProjectAssignment() {
  const cached = getCache(CACHE.MY_PROJECTS);
  if (cached) {
    hasMyProjects = cached.hasMyProjects;
    myProjectStores = cached.myProjectStores || [];
    if (hasMyProjects) {
      const showChip = function(retries) {
        const projChip = document.getElementById('filterProject');
        if (projChip) projChip.classList.add('visible');
        else if (retries > 0) setTimeout(function() { showChip(retries - 1); }, 200);
      };
      showChip(5);
    }
    return;
  }
  try {
    const snap = await db.ref("stores_light").once("value");
    const all = snap.val() || {};
    let foundCount = 0;
    const myKey = String(currentUser.key).trim();
    const myCode = String(currentUser.code).trim();
    myProjectStores = [];
    for (const k in all) {
      const s = all[k];
      if (!s || !s.projects) continue;
      if (isClosed(s)) {
        s._key = k;
        if (getVisitStatus(s) !== "lead") continue;
      }
      const projectNames = Object.keys(s.projects);
      for (const projectName of projectNames) {
        const codes = String(s.projects[projectName]).split(';').map(x => x.trim());
        if (codes.indexOf(myKey) !== -1 || codes.indexOf(myCode) !== -1) {
          foundCount++;
          if (!isNaN(s.lat) && !isNaN(s.lng)) myProjectStores.push({ lat: s.lat, lng: s.lng });
          break;
        }
      }
    }
    hasMyProjects = (foundCount > 0);
    setCache(CACHE.MY_PROJECTS, { hasMyProjects: hasMyProjects, myProjectStores: myProjectStores });
    if (hasMyProjects) {
      const showChip = function(retries) {
        const projChip = document.getElementById('filterProject');
        if (projChip) projChip.classList.add('visible');
        else if (retries > 0) setTimeout(function() { showChip(retries - 1); }, 200);
      };
      showChip(5);
    }
  } catch(e) { console.warn("프로젝트 배정 확인 실패:", e); }
}

async function loadOtherPartnerContacts() {

  if (cached) { otherPartnerLastContactMap = cached; return; }
  try {

    const all = snap.val() || {};
    otherPartnerLastContactMap = {};
    for (const partnerKey in all) {
      if (partnerKey === currentUser.key) continue;
      for (const recKey in all[partnerKey]) {
        const rec = all[partnerKey][recKey];
        const storeKey = rec.storeKey;
        const ts = rec.lastUpdatedAt || rec.firstVisitAt || 0;
        if (!storeKey || !ts) continue;
        if (!otherPartnerLastContactMap[storeKey] || otherPartnerLastContactMap[storeKey] < ts) {
          otherPartnerLastContactMap[storeKey] = ts;
        }
      }
    }
    setCache(CACHE.OTHER_VISITS, otherPartnerLastContactMap);
  } catch(e) {}
}

async function loadMyVisits() {
  try {
    const snap = await db.ref("visits/" + currentUser.key).once("value");
    const all = snap.val() || {};
    myVisitedStoreData = {};
    for (const recKey in all) {
      const rec = all[recKey];
      if (rec && rec.storeKey) myVisitedStoreData[rec.storeKey] = rec;
    }
  } catch(e) {}

function computeMyVisitCounts() {
  const counts = { visit: 0, lead: 0, success: 0, fail: 0 };
  for (const storeKey in myVisitedStoreData) {
    const rec = myVisitedStoreData[storeKey];
    const cur = rec.current || {};
    const outcome = String(cur.outcome || "").trim();
    if (outcome === "성사") { counts.success++; continue; }
    if (outcome === "실패") { counts.fail++; continue; }
    const leadFields = [cur.currentStoreName, cur.contact, cur.amount, cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
    const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);
    if (allLeadFilled) { counts.lead++; continue; }
    if (outcome === "폐업") continue;
    const anyField = leadFields.some(v => String(v || "").trim().length > 0)
                     || String(cur.price || "").trim().length > 0
                     || String(cur.freq || "").trim().length > 0;
    if (anyField) counts.visit++;
  }
  return counts;
}

  if (isAdminUser) {

    return;

  const counts = computeMyVisitCounts();
  document.querySelectorAll('.chip-count').forEach(el => {
    const key = el.dataset.countFor;
    const n = counts[key] || 0;

      }
    };
  });

  document.getElementById("searchInput").oninput = function(e) {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    searchTimer = setTimeout(function() {
      if (q.length >= 1) searchStores(q);
      else document.getElementById("searchResults").style.display = "none";
    }, 300);
  };
  document.addEventListener("click", function(e) {
    if (!e.target.closest("#searchBar")) {
      document.getElementById("searchResults").style.display = "none";
    }
  });

  document.getElementById("panelClose").onclick = function(e) {
    e.stopPropagation();
    closePanel(false);
  };

  const panel = document.getElementById("storePanel");
  let touchStartY = 0;
  let isDragging = false;
  let dragStartedAtTop = false;

  panel.addEventListener("touchstart", function(e) {
    touchStartY = e.touches[0].clientY;
    const target = e.target;
    const isHeaderArea = (target.id === 'panelDrag' || target.id === 'panelClose');
    const atTop = panel.scrollTop <= 0;
    dragStartedAtTop = isHeaderArea || atTop;
    isDragging = true;
  }, { passive: true });

  panel.addEventListener("touchmove", function(e) {
    if (!isDragging || !dragStartedAtTop) return;
    const deltaY = e.touches[0].clientY - touchStartY;
    if (deltaY > 80) { closePanel(false); isDragging = false; }
  }, { passive: true });

  panel.addEventListener("touchend", function() { isDragging = false; dragStartedAtTop = false; }, { passive: true });
  document.getElementById("panelDrag").onclick = function() { closePanel(false); };
}

function getFilterColor(f) {
  return { all:"#363859", visit:"#4d4678", lead:"#43A047", success:"#F5B800", fail:"#E53935", contract:"#F2AC57" }[f] || "#363859";
}

function createClusterer() {
  const baseStyle = {
    color: 'white', border: '3px solid white', borderRadius: '50%',
    textAlign: 'center', fontWeight: '700', boxShadow: '0 2px 10px rgba(0,0,0,0.25)'
  };
  const clusterer = new kakao.maps.MarkerClusterer({
    map: map, averageCenter: true, minLevel: CLUSTER_MIN_LEVEL,
    minClusterSize: 2, disableClickZoom: true, gridSize: 60,
    calculator: [10, 100],
    styles: [
      Object.assign({}, baseStyle, { width: '44px', height: '44px', lineHeight: '38px', fontSize: '13px', background: '#363859' }),
      Object.assign({}, baseStyle, { width: '52px', height: '52px', lineHeight: '46px', fontSize: '14px', background: '#363859' }),
      Object.assign({}, baseStyle, { width: '60px', height: '60px', lineHeight: '54px', fontSize: '15px', background: '#363859' })
    ]
  });
  kakao.maps.event.addListener(clusterer, 'clustered', function(clusters) { applyClusterColors(clusters); });
  kakao.maps.event.addListener(clusterer, 'clusterclick', function(cluster) { handleClusterClick(cluster); });
  return clusterer;
}

function handleClusterClick(cluster) {
  try {
    const ms = cluster.getMarkers ? cluster.getMarkers() : [];
    if (ms.length === 0) return;
    if (ms.length === 1) {
      map.setCenter(ms[0].getPosition());
      map.setLevel(3);
      return;
    }
    const bounds = new kakao.maps.LatLngBounds();
    ms.forEach(function(m) { bounds.extend(m.getPosition()); });
    map.setBounds(bounds, 80, 80, 80, 80);
    setTimeout(function() {
      if (map.getLevel() >= CLUSTER_MIN_LEVEL) map.setLevel(CLUSTER_MIN_LEVEL - 1);
    }, 150);
  } catch(e) {}
}

function applyClusterColors(clusters) {
  if (!clusters || clusters.length === 0) return;
  const filterColorMap = {
    visit: '#4d4678', lead: '#43A047', success: '#F5B800', fail: '#E53935', contract: '#F2AC57'
  };
  clusters.forEach(function(cluster) {
    let bgColor;
    if (filterColorMap[currentFilter]) {
      bgColor = filterColorMap[currentFilter];
    } else if (currentFilter === 'project') {
      bgColor = '#363859';
    } else {
      bgColor = computeDominantClusterColor(cluster);
    }
    try {
      const overlay = cluster._clusterMarker;
      if (overlay && overlay.getContent) {
        const content = overlay.getContent();
        if (typeof content === 'string') {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = content;
          const innerDiv = tempDiv.firstElementChild;
          if (innerDiv && innerDiv.style) {
            innerDiv.style.background = bgColor;
            overlay.setContent(tempDiv.innerHTML);
          }
        } else if (content && content.style) {
          content.style.background = bgColor;
        }
      }
    } catch(e) {}
  });
}

function computeDominantClusterColor(cluster) {
  const ms = cluster.getMarkers ? cluster.getMarkers() : [];
  if (ms.length === 0) return '#363859';
  const counts = { visit: 0, lead: 0, success: 0, fail: 0, contract: 0, closedByMe: 0, none: 0 };
  ms.forEach(function(m) {
    const status = m._upboxStatus || 'none';
    if (counts[status] !== undefined) counts[status]++;
  });
  const priorityOrder = ['success', 'lead', 'visit', 'fail', 'contract', 'closedByMe'];
  let maxCount = 0;
  let dominant = 'none';
  for (const key of priorityOrder) {
    if (counts[key] > maxCount) { maxCount = counts[key]; dominant = key; }
  }
  return getStatusColor(dominant);
}

async function moveToFilteredStoresForPartner(filter) {
  const statusBar = document.getElementById('statusBar');
  if (statusBar) statusBar.textContent = '필터 적용 중...';

  if (filter === 'all') { renderMarkers(); return; }
  if (filter === 'contract') { await moveToContractStores(); return; }

  const targetKeys = [];
  for (const storeKey in myVisitedStoreData) {
    const rec = myVisitedStoreData[storeKey];
    const cur = rec.current || {};
    const outcome = String(cur.outcome || "").trim();
    let status = 'visit';
    if (outcome === '성사') status = 'success';
    else if (outcome === '실패') status = 'fail';
    else {
      const leadFields = [cur.currentStoreName, cur.contact, cur.amount, cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
      const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);
      if (allLeadFilled) status = 'lead';
      else if (outcome === '폐업') status = 'closedByMe';
    }
    if (status === filter) targetKeys.push(storeKey);
  }

  if (targetKeys.length === 0) {
    if (statusBar) statusBar.textContent = '해당 상태 업장 없음';
    renderMarkers();
    return;
  }

  await fitMapToStoreKeys(targetKeys, filter);
}

async function moveToContractStores() {
  const statusBar = document.getElementById('statusBar');
  try {
    const snap = await db.ref('stores_light').once('value');
    const all = snap.val() || {};
    const coords = [];
    for (const k in all) {
      const s = all[k];
      if (!s || isNaN(s.lat) || isNaN(s.lng)) continue;
      if (!isContractGrade(s.grade)) continue;
      if (currentUserLocation) {
        const dist = haversine(currentUserLocation.lat, currentUserLocation.lng, s.lat, s.lng);
        if (dist > CONTRACT_RADIUS_KM) continue;
      }
      coords.push({ lat: s.lat, lng: s.lng });
      if (coords.length >= FILTER_MOVE_MAX_PINS) break;
    }
    if (coords.length === 0) {
      if (statusBar) statusBar.textContent = '근처 기계약 업장 없음';
      renderMarkers();
      return;
    }
    fitToCoords(coords);
  } catch(e) { renderMarkers(); }
}

async function fitMapToStoreKeys(targetKeys, filterLabel) {
  const statusBar = document.getElementById('statusBar');
  if (statusBar) statusBar.textContent = '필터 적용 중... (' + targetKeys.length + '개)';
  const limited = targetKeys.slice(0, FILTER_MOVE_MAX_PINS);
  try {
    const fetchPromises = limited.map(function(k) {
      return db.ref('stores_light/' + k).once('value').then(function(snap) {
        const v = snap.val();
        if (v && !isNaN(v.lat) && !isNaN(v.lng)) return { lat: v.lat, lng: v.lng };
        return null;
      }).catch(function() { return null; });
    });
    const results = await Promise.all(fetchPromises);
    const validCoords = results.filter(function(c) { return c !== null; });
    if (validCoords.length === 0) {
      if (statusBar) statusBar.textContent = '좌표 없음';
      renderMarkers();
      return;
    }
    fitToCoords(validCoords);
  } catch(e) { renderMarkers(); }
}

function fitToCoords(coords) {
  if (!coords || coords.length === 0) return;
  if (coords.length === 1) {
    map.setCenter(new kakao.maps.LatLng(coords[0].lat, coords[0].lng));
    map.setLevel(4);
  } else {
    const bounds = new kakao.maps.LatLngBounds();
    coords.forEach(function(c) { bounds.extend(new kakao.maps.LatLng(c.lat, c.lng)); });
    map.setBounds(bounds, 80, 80, 80, 80);
    setTimeout(function() { if (map.getLevel() < 4) map.setLevel(4); }, 100);
  }
}

function startLocationTracking() {
  if (!navigator.geolocation || geoWatchId !== null) return;
  geoWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      currentUserLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      updateMyLocationMarker(pos.coords.latitude, pos.coords.longitude);
    },
    function(err) {},
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function stopLocationTracking() {
  if (geoWatchId !== null) { navigator.geolocation.clearWatch(geoWatchId); geoWatchId = null; }
  if (myLocationMarker) { myLocationMarker.setMap(null); myLocationMarker = null; }
}

function updateMyLocationMarker(lat, lng) {
  const position = new kakao.maps.LatLng(lat, lng);
  if (myLocationMarker) { myLocationMarker.setPosition(position); return; }
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="#FFFFFF"/><circle cx="11" cy="11" r="7" fill="#1A73E8"/></svg>';
  const imageSrc = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  const markerImage = new kakao.maps.MarkerImage(imageSrc, new kakao.maps.Size(22, 22), { offset: new kakao.maps.Point(11, 11) });
  myLocationMarker = new kakao.maps.Marker({ position: position, image: markerImage, zIndex: 9999 });
  myLocationMarker.setMap(map);
}

function moveToMyLocation() {
  if (currentUserLocation) {
    map.setCenter(new kakao.maps.LatLng(currentUserLocation.lat, currentUserLocation.lng));
    map.setLevel(4);
    return;
  }
  if (!navigator.geolocation) { alert("위치 기능을 지원하지 않는 브라우저입니다."); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    currentUserLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    updateMyLocationMarker(pos.coords.latitude, pos.coords.longitude);
    map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
    map.setLevel(4);
  }, function(err) {
    alert("현재 위치를 가져올 수 없습니다.\n위치 권한을 허용해주세요.");
  });
}

async function loadStoresInView() {
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const latMin = sw.getLat(), latMax = ne.getLat();
  const lngMin = sw.getLng(), lngMax = ne.getLng();
  document.getElementById("statusBar").textContent = "업장 로딩 중...";
  try {
    const snap = await db.ref("stores_light").orderByChild("lat").startAt(latMin).endAt(latMax).once("value");
    const raw = snap.val() || {};
    let list = [];
    for (const k in raw) {
      const s = raw[k];
      if (!s || isNaN(s.lat) || isNaN(s.lng)) continue;
      if (s.lng < lngMin || s.lng > lngMax) continue;
      s._key = k;
      list.push(s);
    }
    list = list.filter(s => {
      if (!isClosed(s)) return true;
      return getVisitStatus(s) === "lead";
    });
    list = list.filter(s => isVisibleForProject(s, currentUser.key));
    if (!hasMyProjects) {
      for (const s of list) {
        if (amIAssignedToProject(s, currentUser.key)) {
          hasMyProjects = true;
          const projChip = document.getElementById('filterProject');
          if (projChip) projChip.classList.add('visible');
          break;
        }
      }
    }
    if (currentUserLocation) {
      list = list.filter(function(s) {
        if (!isContractGrade(s.grade)) return true;
        const dist = haversine(currentUserLocation.lat, currentUserLocation.lng, s.lat, s.lng);
        return dist <= CONTRACT_RADIUS_KM;
      });
    }
    list = removeContractDuplicates(list);
    allStoresInView = list;
    renderMarkers();
  } catch(e) {
    document.getElementById("statusBar").textContent = "로딩 실패";
  }
}

function isVisibleForProject(store, currentPartnerKey) {
  if (!store.projects) return true;
  const keys = Object.keys(store.projects);
  if (keys.length === 0) return true;
  for (const projectName of keys) {
    const codes = String(store.projects[projectName]).split(';').map(s => s.trim());
    if (codes.indexOf(currentPartnerKey) !== -1) return true;
  }
  return false;
}

function amIAssignedToProject(store, currentPartnerKey) {
  if (!store.projects) return false;
  const keys = Object.keys(store.projects);
  if (keys.length === 0) return false;
  const myKey = String(currentPartnerKey || '').trim();
  const myCode = currentUser ? String(currentUser.code || '').trim() : '';
  for (const projectName of keys) {
    const codes = String(store.projects[projectName]).split(';').map(s => s.trim());
    if (codes.indexOf(myKey) !== -1 || (myCode && codes.indexOf(myCode) !== -1)) return true;
  }
  return false;
}

function isContractGrade(g) {
  if (!g) return false;
  const s = String(g).trim();
  return s === "기계약" || s === "업박스기계약업장" || s.indexOf("기계약") !== -1;
}

function isClosed(store) { return store && store.closed === true; }

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function removeContractDuplicates(list) {
  const contracts = list.filter(s => isContractGrade(s.grade));
  const others = list.filter(s => !isContractGrade(s.grade));
  const filteredOthers = others.filter(function(o) {
    for (const c of contracts) {
      const distM = haversine(o.lat, o.lng, c.lat, c.lng) * 1000;
      if (distM <= DUPLICATE_RADIUS_M && nameSimilarity(o.name, c.name) >= 0.7) return false;
    }
    return true;
  });
  return contracts.concat(filteredOthers);
}

function nameSimilarity(a, b) {
  if (!a || !b) return 0;
  a = String(a).replace(/\s+/g, "");
  b = String(b).replace(/\s+/g, "");
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  let matches = 0;
  for (let i = 0; i < shorter.length; i++) {
    if (longer.indexOf(shorter[i]) !== -1) matches++;
  }
  return matches / longer.length;
}

function getEffectiveStatus(store) {
  if (isAdminUser && adminViewActive && visitsAggregate && visitsAggregate.stores) {
    const aggData = visitsAggregate.stores[store._key];
    if (aggData && aggData.lastStatus) {
      if (isContractGrade(store.grade)) return "contract";
      return aggData.lastStatus;
    }
  }
  return getVisitStatus(store);
}

function renderMarkers() {
  if (markerClusterer) markerClusterer.clear();
  markers.forEach(m => m.setMap(null));
  markers = [];
  markerByKey = {};

  let shown = 0;
  let selectedRendered = false;
  const clusterMarkers = [];
  const directMarkers = [];

  for (const store of allStoresInView) {
    const status = getEffectiveStatus(store);
    if (currentFilter === "project") {
      if (!amIAssignedToProject(store, currentUser.key)) continue;
    } else if (currentFilter !== "all" && status !== currentFilter) {
      continue;
    }
    const isSelected = selectedStore && selectedStore._key === store._key;
    if (isSelected) selectedRendered = true;
    const marker = createMarker(store, status, isSelected);
    markers.push(marker);
    markerByKey[store._key] = marker;
    shown++;
    // 관리자뷰의 기계약은 클러스터링 X (B안)
    if (isSelected || (isAdminUser && adminViewActive && isContractGrade(store.grade))) {
      directMarkers.push(marker);
    } else {
      clusterMarkers.push(marker);
    }
  }

  if (selectedStore && !selectedRendered) {
    const status = getEffectiveStatus(selectedStore);
    const marker = createMarker(selectedStore, status, true);
    markers.push(marker);
    markerByKey[selectedStore._key] = marker;
    directMarkers.push(marker);
  }

  if (markerClusterer && clusterMarkers.length > 0) {
    markerClusterer.addMarkers(clusterMarkers);
    setTimeout(function() {
      try {
        const clusters = markerClusterer.getClusters ? markerClusterer.getClusters() : [];
        if (clusters && clusters.length > 0) applyClusterColors(clusters);
      } catch(e) {}
    }, 100);
  }
  directMarkers.forEach(function(m) { m.setMap(map); });

  console.log('[renderMarkers] 클러스터 ' + clusterMarkers.length + '개 + 직접표시 ' + directMarkers.length + '개');
  document.getElementById("statusBar").textContent = shown + "개 업장 표시됨";
}

function createMarker(store, status, isSelected) {
  const position = new kakao.maps.LatLng(store.lat, store.lng);
  const color = getStatusColor(status);

  let labelLines;
  if (isAdminUser && adminViewActive && !isContractGrade(store.grade)) {
    const aggData = visitsAggregate && visitsAggregate.stores ? visitsAggregate.stores[store._key] : null;
    const partnerName = aggData ? aggData.lastPartnerName : '';
    labelLines = formatPartnerNameForPin(partnerName);
  } else {
    labelLines = [getGradeIcon(store.grade)];
  }

  let w, h, anchorX, anchorY, zIdx, strokeColor, strokeWidth;
  if (isSelected) {
    w = 38; h = 48; anchorX = 19; anchorY = 48; zIdx = 1000;
    strokeColor = '#1a1a1a'; strokeWidth = 2.5;
  } else if (labelLines.length >= 2) {
    w = 30; h = 38; anchorX = 15; anchorY = 38; zIdx = 1;
    strokeColor = 'white'; strokeWidth = 1.6;
  } else {
    w = 26; h = 33; anchorX = 13; anchorY = 33; zIdx = 1;
    strokeColor = 'white'; strokeWidth = 1.6;
  }

  const svg = buildPinSvg(w, h, color, strokeColor, strokeWidth, labelLines);
  const imageSrc = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  const markerImage = new kakao.maps.MarkerImage(imageSrc, new kakao.maps.Size(w, h), { offset: new kakao.maps.Point(anchorX, anchorY) });
  const marker = new kakao.maps.Marker({ position: position, image: markerImage, zIndex: zIdx });
  marker._upboxStatus = status;
  marker._upboxStoreKey = store._key;
  marker._upboxIsContract = isContractGrade(store.grade);
  kakao.maps.event.addListener(marker, "click", function() { openPanel(store); });
  return marker;
}

function buildPinSvg(w, h, fillColor, strokeColor, strokeWidth, lines) {
  if (!lines || lines.length === 0) lines = ['-'];
  let textElements = '';
  if (lines.length === 1) {
    textElements = '<text x="16" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="white">' + escapeXml(lines[0]) + '</text>';
  } else {
    textElements =
      '<text x="16" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="white">' + escapeXml(lines[0]) + '</text>' +
      '<text x="16" y="25" text-anchor="middle" font-size="9" font-weight="bold" fill="white">' + escapeXml(lines[1]) + '</text>';
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 32 40">' +
         '<path d="M16 0.8 C7.4 0.8 0.8 7.4 0.8 16 C0.8 24.6 16 39.2 16 39.2 C16 39.2 31.2 24.6 31.2 16 C31.2 7.4 24.6 0.8 16 0.8 Z" ' +
         'fill="' + fillColor + '" stroke="' + strokeColor + '" stroke-width="' + strokeWidth + '"/>' +
         textElements + '</svg>';
}

function escapeXml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function formatPartnerNameForPin(name) {
  if (!name) return ['-'];
  const clean = String(name).trim().replace(/\s+/g, '');
  if (clean.length === 0) return ['-'];
  if (clean.length <= 2) return [clean];

  const surnamesSingle = '김이박최정강조윤장임한오서신권황안송류전홍고문양손배백허유남심노하곽성차주구원우진민방천표채공현함변여염도어';
  const surnamesDouble = ['남궁', '제갈', '독고', '황보', '선우', '서문', '사공', '동방', '망절'];

  if (clean.length === 4) {
    const firstTwo = clean.substring(0, 2);
    if (surnamesDouble.indexOf(firstTwo) !== -1) return [clean.substring(2)];
    if (surnamesSingle.indexOf(clean[0]) !== -1) return [clean.substring(2)];
    // 회사명 4글자: 2글자씩 줄바꿈
    return [clean.substring(0, 2), clean.substring(2)];
  }
  if (clean.length === 3) {
    if (surnamesSingle.indexOf(clean[0]) !== -1) return [clean.substring(1)];
    return [clean];
  }
  // 5글자 이상
  return [clean.substring(0, 2)];
}

function getStatusColor(status) {
  return {
    visit:"#4d4678", lead:"#43A047", success:"#F5B800", fail:"#E53935",
    contract:"#F2AC57", closedByMe:"#616161", none:"#9E9E9E"
  }[status] || "#9E9E9E";
}

function getGradeIcon(grade) {
  if (!grade) return "-";
  const g = String(grade).trim();
  if (isContractGrade(g)) return "★";
  if (g === "A등급") return "A";
  if (g === "B등급") return "B";
  if (g === "C등급") return "C";
  return "-";
}

function getVisitStatus(store) {
  if (isContractGrade(store.grade)) return "contract";
  const rec = myVisitedStoreData[store._key];
  if (!rec) return "none";
  const cur = rec.current || {};
  const outcome = String(cur.outcome || "").trim();
  if (outcome === "성사") return "success";
  if (outcome === "실패") return "fail";
  const leadFields = [cur.currentStoreName, cur.contact, cur.amount, cur.suggestedPrice, cur.bins, cur.vinyl, cur.truck, cur.note];
  const allLeadFilled = leadFields.every(v => String(v || "").trim().length > 0);
  if (allLeadFilled) return "lead";
  if (outcome === "폐업") return "closedByMe";
  const anyField = leadFields.some(v => String(v || "").trim().length > 0) || String(cur.price || "").trim().length > 0 || String(cur.freq || "").trim().length > 0;
  if (anyField) return "visit";
  return "none";
}

async function openPanel(store) {
  rvInstance = null;
  currentRvState = 'collapsed';

  const previousKey = selectedStore ? selectedStore._key : null;
  selectedStore = store;
  if (previousKey !== store._key) refreshMarkerSelection(previousKey, store._key);

  const panel = document.getElementById("storePanel");
  const content = document.getElementById("panelContent");
  content.innerHTML = '<h2 style="color:#999;">업장 정보 불러오는 중...</h2>';
  panel.classList.add("open");

  try {
    const detailSnap = await db.ref("stores/" + store._key).once("value");
    const detail = detailSnap.val();
    if (detail) store = Object.assign({}, detail, store);
  } catch(e) {}
  selectedStore = store;

  const isContract = isContractGrade(store.grade);
  const closedFlag = isClosed(store);

  const adminBadge = store.adminType ? '<span class="badge badge-admin">' + escapeHtml(store.adminType) + '</span>' : '';
  const gradeBadge = isContract ? '<span class="badge badge-contract">★ 기계약</span>' : '<span class="badge badge-grade">' + escapeHtml(store.grade || '미지정') + '</span>';
  const closedBadge = closedFlag ? '<span class="badge badge-closed">⚠️ 폐업</span>' : '';

  let projectsBadgeHtml = '';
  if (amIAssignedToProject(store, currentUser.key)) {
    const projectNames = Object.keys(store.projects);
    projectsBadgeHtml = '<div class="multi-projects">' + projectNames.map(name => {
      return '<div class="project-badge"><span class="project-badge-icon">🎯</span><span>' + escapeHtml(name) + '</span></div>';
    }).join('') + '</div>';
  }

  let adminInfoHtml = '';
  if (isAdminUser && adminViewActive && visitsAggregate && visitsAggregate.stores) {
    const aggData = visitsAggregate.stores[store._key];
    if (aggData) {
      const lastDate = aggData.lastUpdatedAt ? formatDate(aggData.lastUpdatedAt) : '-';
      const statusLabel = getStatusLabel(aggData.lastStatus);
      adminInfoHtml = '<div class="admin-info-box">' +
        '<div><span class="admin-info-label">최신 접촉:</span>' + escapeHtml(aggData.lastPartnerName || '-') + ' (' + lastDate + ')</div>' +
        '<div><span class="admin-info-label">최신 상태:</span>' + statusLabel + '</div>' +
        '<div><span class="admin-info-label">접촉 파트너 수:</span>' + (aggData.totalContacts || 1) + '명</div>' +
        '</div>';
    }
  }

  const otherTs = otherPartnerLastContactMap[store._key];
  const otherContactHtml = otherTs ? '<div class="contact-info">타파트너 마지막접촉일자: ' + formatDate(otherTs) + '</div>' : '';

  let serviceHtml = '';
  if (!isContract) {
    const basicClass = store.basic === 'ON' ? 'service-badge on' : 'service-badge';
    const plusClass = store.plus === 'ON' ? 'service-badge on' : 'service-badge';
    const basicText = store.basic && store.basic !== '' ? store.basic : '-';
    const plusText = store.plus && store.plus !== '' ? store.plus : '-';
    serviceHtml = '<div class="service"><span class="' + basicClass + '">베이직 ' + escapeHtml(basicText) + '</span><span class="' + plusClass + '">플러스 ' + escapeHtml(plusText) + '</span></div>';
  }

  const roadviewHtml = isContract ? '' : '<div class="roadview-section"><div class="roadview-header" onclick="toggleRoadview()"><span id="rvHeaderText">🌆 현장 로드뷰 (클릭하여 보기)</span><span class="roadview-header-toggle" id="rvToggleArrow">▼</span></div><div class="roadview-body" id="rvBody"><div class="rv-loading" id="rvLoading" style="display:none;">로드 중...</div><div id="roadview"></div><div class="rv-empty" id="rvEmpty" style="display:none;">로드뷰 없음</div><a href="https://map.kakao.com/link/roadview/' + store.lat + ',' + store.lng + '" target="_blank" class="rv-external">카카오맵에서 보기 →</a></div></div>';

  const infoRows = [];
  if (store.bizType) infoRows.push({k:"업종", v:store.bizType});
  if (store.area) infoRows.push({k:"면적", v:store.area});
  if (store.phone) infoRows.push({k:"전화번호", v:store.phone});
  if (store.volume) infoRows.push({k:"예상배출량", v:store.volume});
  const infoHtml = infoRows.length === 0 ? '' : '<div class="info-table">' + infoRows.map(r => '<div class="info-row"><span class="info-key">' + r.k + '</span><span class="info-value">' + escapeHtml(r.v) + '</span></div>').join('') + '</div>';

  const memoHtml = store.memo ? '<div class="memo">📝 ' + escapeHtml(store.memo) + '</div>' : '';
  const priceGuideBtnHtml = isContract ? '' : '<button class="priceGuideBtn" onclick="openPriceGuide()">📊 영업기준표 확인</button>';
  const navBtnHtml = isContract ? '' : '<button class="navBtn" type="button" onclick="openKakaoNav(selectedStore)">🧭 카카오맵 길찾기</button>';
  const visitFormHtml = isContract ? '' : buildVisitForm();

  content.innerHTML =
    '<h2>' + escapeHtml(store.name || '(이름 없음)') + '</h2>' +
    '<div class="addr">' + escapeHtml(store.address || '') + '</div>' +
    '<div class="badges">' + adminBadge + gradeBadge + closedBadge + '</div>' +
    projectsBadgeHtml + adminInfoHtml + otherContactHtml + serviceHtml +
    roadviewHtml + infoHtml + memoHtml + priceGuideBtnHtml + navBtnHtml + visitFormHtml;

  if (!isContract) { loadMyVisit(store); bindVisitForm(store); }
}

function refreshMarkerSelection(previousKey, newKey) {
  // 단순화: 다음 renderMarkers()에서 자동으로 selection 반영됨
  if (isAdminUser) {
    renderAdminView();
  } else {
    renderMarkers();
  }
}

function closePanel(clearSelection) {
  document.getElementById("storePanel").classList.remove("open");
  rvInstance = null;
  currentRvState = 'collapsed';
  if (clearSelection && selectedStore) {
    const previousKey = selectedStore._key;
    selectedStore = null;
    if (isAdminUser) renderAdminView();
    else renderMarkers();
  }
}

function toggleRoadview() {
  const body = document.getElementById("rvBody");
  const arrow = document.getElementById("rvToggleArrow");
  const headerText = document.getElementById("rvHeaderText");
  if (!body) return;
  if (currentRvState === 'collapsed') {
    body.classList.add("expanded");
    arrow.textContent = "▲";
    headerText.textContent = "🌆 현장 로드뷰";
    currentRvState = 'expanded';
    loadRoadviewForCurrentStore();
  } else {
    body.classList.remove("expanded");
    arrow.textContent = "▼";
    headerText.textContent = "🌆 현장 로드뷰 (클릭하여 보기)";
    currentRvState = 'collapsed';
  }
}

function loadRoadviewForCurrentStore() {
  if (!selectedStore) return;
  const rvLoading = document.getElementById("rvLoading");
  const rvEmpty = document.getElementById("rvEmpty");
  const rvContainer = document.getElementById("roadview");
  rvLoading.style.display = "flex";
  rvEmpty.style.display = "none";
  rvContainer.innerHTML = "";
  const position = new kakao.maps.LatLng(selectedStore.lat, selectedStore.lng);
  const rvClient = new kakao.maps.RoadviewClient();
  rvClient.getNearestPanoId(position, 50, function(panoId) {
    rvLoading.style.display = "none";
    if (!panoId) { rvEmpty.style.display = "flex"; return; }
    rvInstance = new kakao.maps.Roadview(rvContainer);
    rvInstance.setPanoId(panoId, position);
  });
}

function buildKakaoNavUrl(store) {
  const name = String(store.name || '업장').replace(/[,/]/g, ' ').trim();
  return 'https://map.kakao.com/link/to/' + name + ',' + store.lat + ',' + store.lng;
}

function openKakaoNav(store) {
  const appScheme = 'kakaomap://route?ep=' + store.lat + ',' + store.lng + '&by=car';
  const webFallback = buildKakaoNavUrl(store);
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (!isMobile) { window.open(webFallback, '_blank'); return; }
  const startTime = Date.now();
  const fallbackTimer = setTimeout(function() {
    if (document.hidden || document.webkitHidden) return;
    if (Date.now() - startTime < 1400) return;
    window.location.href = webFallback;
  }, 1500);
  document.addEventListener('visibilitychange', function onVis() {
    if (document.hidden) {
      clearTimeout(fallbackTimer);
      document.removeEventListener('visibilitychange', onVis);
    }
  });
  window.location.href = appScheme;
}

async function generateSSOToken(partnerName, partnerCode) {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
  const kst = new Date(utc + 9 * 60 * 60 * 1000);
  const today = kst.getFullYear() + String(kst.getMonth() + 1).padStart(2, '0') + String(kst.getDate()).padStart(2, '0');
  const raw = partnerName + '|' + partnerCode + '|' + today + '|' + SSO_SECRET;
  const data = new TextEncoder().encode(raw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).slice(0, 8).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function openPriceGuide() {
  if (!selectedStore || !currentUser) return;
  try {
    const token = await generateSSOToken(currentUser.name, currentUser.code);
    const params = new URLSearchParams();
    params.append('sso', '1');
    params.append('partner_name', currentUser.name);
    params.append('partner_code', currentUser.code);
    params.append('token', token);
    if (selectedStore.sido) params.append('sido', selectedStore.sido);
    if (selectedStore.sigungu) params.append('sidodong', selectedStore.sigungu);
    if (selectedStore.gu) params.append('gueup', selectedStore.gu);
    else params.append('gueup', '없음');
    if (selectedStore.emd) params.append('dong', selectedStore.emd);
    params.append('service', '베이직');
    window.open(PRICE_GUIDE_URL + '?' + params.toString(), '_blank');
  } catch(err) {
    alert('영업기준표를 여는 중 오류가 발생했습니다.');
  }
}

function buildVisitForm() {
  return '<div class="visit-form">' +
    '<h3>방문기록</h3>' +
    '<div class="visit-dates" id="visitDates"></div>' +
    '<label><span style="color:#E53935;">*</span> 현재 업체명</label>' +
    '<input id="v_currentStoreName" type="text" placeholder="예: ㅇㅇ환경 (없을경우 사유기재)">' +
    '<label>담당자 연락처</label>' +
    '<input id="v_contact" type="tel" inputmode="numeric" placeholder="예: 010-0000-0000" maxlength="13">' +
    '<label>월 예상배출량 (L)</label><input id="v_amount" type="text" inputmode="numeric" placeholder="예: 500">' +
    '<label>현재 단가 (원/L)</label><input id="v_price" type="text" inputmode="numeric" placeholder="예: 180">' +
    '<label>제안 단가 (원/L)</label><input id="v_suggestedPrice" type="text" inputmode="numeric" placeholder="예: 170">' +
    '<label>현재 주 수거횟수</label><input id="v_freq" type="text" inputmode="numeric" placeholder="예: 3">' +
    '<label><span style="color:#E53935;">*</span> 현재 통 갯수</label>' +
    '<input id="v_bins" type="text" inputmode="numeric" placeholder="예: 4">' +
    '<label><span style="color:#E53935;">*</span> 비닐 사용여부</label>' +
    '<select id="v_vinyl"><option value="">선택</option><option value="사용">사용</option><option value="미사용">미사용</option><option value="지자체">지자체</option><option value="처리기">처리기</option></select>' +
    '<label><span style="color:#E53935;">*</span> 5톤 차량 진입 가능여부</label>' +
    '<select id="v_truck"><option value="">선택</option><option value="가능">가능</option><option value="불가능">불가능</option></select>' +
    '<label>상세 상담내용</label><textarea id="v_note" placeholder="상담 내용을 기록하세요"></textarea>' +
    '<label>최종영업결과</label>' +
    '<select id="v_outcome"><option value="">선택</option><option value="성사">성사</option><option value="실패">실패</option><option value="폐업">폐업</option></select>' +
    '<button class="save-btn" id="saveVisitBtn">저장</button></div>';
}

function loadMyVisit(store) {
  const rec = myVisitedStoreData[store._key];
  if (!rec) {
    const dateEl = document.getElementById("visitDates");
    if (dateEl) dateEl.textContent = "";
    return;
  }
  const cur = rec.current || {};
  ['currentStoreName','contact','amount','price','suggestedPrice','freq','bins','vinyl','truck','note','outcome'].forEach(function(k) {
    setVal('v_' + k, cur[k]);
  });
  const first = rec.firstVisitAt ? formatDate(rec.firstVisitAt) : '';
  const last = rec.lastUpdatedAt ? formatDate(rec.lastUpdatedAt) : '';
  const dateText = first && last && first !== last ? '최초 방문: ' + first + ' · 마지막 수정: ' + last : (first ? '최초 방문: ' + first : '');
  const dateEl = document.getElementById("visitDates");
  if (dateEl) dateEl.textContent = dateText;
}

function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v || ""; }

function bindVisitForm(store) {
  const btn = document.getElementById("saveVisitBtn");
  if (!btn) return;
  btn.onclick = function() { saveVisit(store); };

  const contactInput = document.getElementById("v_contact");
  if (contactInput) {
    contactInput.addEventListener("input", function(e) {
      let v = e.target.value.replace(/[^0-9]/g, "");
      if (!v) { e.target.value = ""; return; }
      const mobilePrefix = ["010","011","016","017","018","019"];
      const prefix3 = v.substring(0, 3);
      if (mobilePrefix.indexOf(prefix3) !== -1) {
        if (v.length <= 3) e.target.value = v;
        else if (v.length <= 7) e.target.value = v.substring(0, 3) + "-" + v.substring(3);
        else if (prefix3 === "010") e.target.value = v.substring(0, 3) + "-" + v.substring(3, 7) + "-" + v.substring(7, 11);
        else if (v.length === 11) e.target.value = v.substring(0, 3) + "-" + v.substring(3, 7) + "-" + v.substring(7, 11);
        else e.target.value = v.substring(0, 3) + "-" + v.substring(3, 6) + "-" + v.substring(6, 10);
      } else { e.target.value = v; }
    });
  }
}

async function saveVisit(store) {
  const btn = document.getElementById("saveVisitBtn");
  btn.disabled = true;
  btn.textContent = "저장 중...";

  const currentData = {};
  ['currentStoreName','contact','amount','price','suggestedPrice','freq','bins','vinyl','truck','note','outcome'].forEach(function(k) {
    currentData[k] = getVal('v_' + k);
  });
  currentData.updatedAt = Date.now();

  const recKey = "REC_" + currentUser.key + "_" + store._key;
  const recRef = db.ref("visits/" + currentUser.key + "/" + recKey);

  try {
    const existingSnap = await recRef.once("value");
    const existing = existingSnap.val();
    const now = Date.now();
    let payload;
    if (existing) {
      const history = existing.history || [];
      if (existing.current) history.push(Object.assign({}, existing.current, { savedAt: existing.current.updatedAt || now }));
      payload = {
        storeKey: store._key, storeName: store.name || '', storeAddress: store.address || '',
        partnerName: currentUser.name, partnerKey: currentUser.key,
        firstVisitAt: existing.firstVisitAt || now, lastUpdatedAt: now,
        current: currentData, history: history
      };
    } else {
      payload = {
        storeKey: store._key, storeName: store.name || '', storeAddress: store.address || '',
        partnerName: currentUser.name, partnerKey: currentUser.key,
        firstVisitAt: now, lastUpdatedAt: now,
        current: currentData, history: []
      };
    }
    await recRef.set(payload);
    myVisitedStoreData[store._key] = payload;
    if (isAdminUser) renderAdminView(); else renderMarkers();
    updateChipCounts();

    btn.textContent = "✓ 저장됨";
    setTimeout(function() { btn.textContent = "저장"; btn.disabled = false; }, 1500);

    const first = formatDate(payload.firstVisitAt);
    const last = formatDate(payload.lastUpdatedAt);
    const dateEl = document.getElementById("visitDates");
    if (dateEl) dateEl.textContent = first !== last ? '최초 방문: ' + first + ' · 마지막 수정: ' + last : '최초 방문: ' + first;
  } catch(e) {
    alert("저장 실패: " + e.message);
    btn.textContent = "저장";
    btn.disabled = false;
  }
}

function getVal(id) { const el = document.getElementById(id); return el ? el.value.trim() : ""; }

async function searchStores(q) {
  try {
    const snap = await db.ref("stores_light").orderByChild("name").startAt(q).endAt(q + '\uf8ff').limitToFirst(30).once("value");
    const raw = snap.val() || {};
    let list = [];
    for (const k in raw) {
      const s = raw[k];
      if (!s) continue;
      s._key = k;
      list.push(s);
    }
    list = list.filter(s => {
      if (!isClosed(s)) return true;
      return getVisitStatus(s) === "lead";
    });
    list = removeContractDuplicates(list);
    renderSearchResults(list);
  } catch(e) {}
}

function renderSearchResults(list) {
  const resultsEl = document.getElementById("searchResults");
  if (list.length === 0) {
    resultsEl.innerHTML = '<div class="search-item search-empty" style="color:#999; padding:14px 12px; line-height:1.5;">검색 결과가 없습니다.<br><span style="color:#F2AC57; font-weight:600;">＋ 업장추가</span> 버튼으로 추가해주세요.</div>';
    resultsEl.style.display = "block";
    return;
  }
  resultsEl.innerHTML = list.map(function(s, idx) {
    const status = getEffectiveStatus(s);
    const statusColor = getStatusColor(status);
    const statusLabel = getStatusLabel(status);
    const projectTag = amIAssignedToProject(s, currentUser.key) ? '<span class="search-project-tag">🎯</span>' : '';
    return '<div class="search-item" data-idx="' + idx + '">' +
      '<div class="search-name-row">' +
      '<span class="search-status-dot" style="background:' + statusColor + ';"></span>' +
      '<span class="search-name">' + escapeHtml(s.name || '(이름 없음)') + '</span>' +
      projectTag +
      '<span class="search-status-label" style="background:' + statusColor + ';">' + statusLabel + '</span>' +
      '</div></div>';
  }).join('');
  resultsEl.querySelectorAll(".search-item").forEach(function(el) {
    el.onclick = function() {
      const idx = parseInt(el.dataset.idx, 10);
      const s = list[idx];
      if (!s) return;
      resultsEl.style.display = "none";
      document.getElementById("searchInput").value = "";
      map.setCenter(new kakao.maps.LatLng(s.lat, s.lng));
      map.setLevel(3);
      openPanel(s);
    };
  });
  resultsEl.style.display = "block";
}

function getStatusLabel(status) {
  return {
    visit: "단순방문", lead: "유효리드", success: "계약성사", fail: "최종불발",
    closedByMe: "폐업", contract: "기계약", none: "미방문"
  }[status] || "미방문";
}

function formatDate(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
